<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>遊戲圖示圖庫</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --bg:#0f0f14;--bg2:#17171e;--bg3:#1e1e28;--bg4:#252532;
    --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);
    --text:#e8e8f0;--text2:#9090a8;--text3:#5a5a72;
    --accent:#7c6af7;--accent2:#5b4fd4;--accent-glow:rgba(124,106,247,.15);--accent-bg:rgba(124,106,247,.1);
    --danger:#e05c5c;--radius:8px;--radius-lg:12px;
  }
  html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;}
  .app{display:flex;flex-direction:column;height:100vh;overflow:hidden;}
  /* topbar */
  .topbar{display:flex;align-items:center;gap:14px;padding:0 20px;height:52px;min-height:52px;background:var(--bg2);border-bottom:1px solid var(--border);}
  .topbar-logo{font-size:15px;font-weight:600;letter-spacing:-.02em;display:flex;align-items:center;gap:8px;}
  .topbar-sep{flex:1;}
  .topbar-search{position:relative;}
  .topbar-search input{background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-size:13px;padding:6px 12px 6px 32px;border-radius:20px;width:220px;outline:none;transition:border-color .15s,box-shadow .15s;}
  .topbar-search input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow);}
  .topbar-search input::placeholder{color:var(--text3);}
  .topbar-search .si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none;}
  /* body */
  .body{display:flex;flex:1;overflow:hidden;}
  /* sidebar */
  .sidebar{width:220px;min-width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
  .sidebar-header{padding:14px 16px 10px;font-size:11px;font-weight:600;letter-spacing:.08em;color:var(--text3);text-transform:uppercase;display:flex;align-items:center;justify-content:space-between;}
  .add-btn{width:22px;height:22px;border-radius:6px;background:transparent;border:1px solid var(--border2);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;line-height:1;transition:background .12s,color .12s;}
  .add-btn:hover{background:var(--accent-bg);color:var(--accent);border-color:var(--accent);}
  .folder-list{flex:1;overflow-y:auto;padding:4px 8px 8px;}
  .folder-list::-webkit-scrollbar{width:4px;}
  .folder-list::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:4px;}
  .folder-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:var(--radius);cursor:pointer;font-size:13px;color:var(--text2);transition:background .1s,color .1s;user-select:none;position:relative;}
  .folder-item:hover{background:var(--bg3);color:var(--text);}
  .folder-item.active{background:var(--accent-bg);color:var(--accent);}
  .folder-label{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .folder-count{font-size:11px;background:var(--bg4);color:var(--text3);padding:1px 6px;border-radius:10px;flex-shrink:0;}
  .folder-item.active .folder-count{background:var(--accent2);color:#fff;}
  .folder-actions{display:none;gap:2px;flex-shrink:0;}
  .folder-item:hover .folder-actions{display:flex;}
  .folder-item:hover .folder-count{display:none;}
  .fac{width:18px;height:18px;border-radius:4px;border:none;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;background:transparent;color:var(--text3);transition:background .1s,color .1s;}
  .fac.r:hover{background:rgba(124,106,247,.2);color:var(--accent);}
  .fac.d:hover{background:rgba(224,92,92,.2);color:var(--danger);}
  .sidebar-footer{padding:10px 16px;border-top:1px solid var(--border);font-size:11px;color:var(--text3);}
  .sidebar-footer a{color:var(--accent);text-decoration:none;cursor:pointer;}
  /* main */
  .main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
  .main-header{padding:12px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--bg);}
  .main-title{font-size:15px;font-weight:600;flex:1;}
  .main-sub{font-size:12px;color:var(--text3);}
  .view-toggle{display:flex;gap:2px;}
  .vbtn{width:30px;height:30px;border-radius:6px;background:transparent;border:1px solid transparent;color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;}
  .vbtn.active{background:var(--bg3);border-color:var(--border2);color:var(--text);}
  .size-wrap{display:flex;align-items:center;gap:6px;margin-left:6px;}
  .size-wrap svg{color:var(--text3);flex-shrink:0;}
  .size-wrap input[type=range]{width:80px;cursor:pointer;accent-color:var(--accent);}
  .grid-area{flex:1;overflow-y:auto;padding:16px 20px;}
  .grid-area::-webkit-scrollbar{width:6px;}
  .grid-area::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:4px;}
  /* grid */
  .icon-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(var(--card-min,100px),1fr));gap:var(--grid-gap,10px);}
  .icon-grid.lv{grid-template-columns:1fr;gap:3px;}
  .icon-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:var(--card-pad,10px) 8px 8px;display:flex;flex-direction:column;align-items:center;gap:7px;cursor:pointer;transition:border-color .13s,background .13s,transform .1s;}
  .icon-card:hover{border-color:var(--accent);background:var(--bg3);transform:translateY(-1px);}
  .icon-grid.lv .icon-card{flex-direction:row;padding:7px 12px;border-radius:var(--radius);gap:12px;transform:none;}
  .thumb{width:var(--thumb-size,72px);height:var(--thumb-size,72px);border-radius:8px;background:var(--bg3);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;}
  .icon-grid.lv .thumb{width:36px;height:36px;border-radius:6px;}
  .thumb img{width:100%;height:100%;object-fit:contain;image-rendering:pixelated;}
  .thumb .ph{color:var(--text3);opacity:.4;}
  .iname{font-size:11px;color:var(--text2);text-align:center;line-height:1.3;word-break:break-all;max-width:100%;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
  .icon-grid.lv .iname{font-size:13px;text-align:left;flex:1;-webkit-line-clamp:1;}
  .iext{font-size:10px;color:var(--text3);display:none;}
  .icon-grid.lv .iext{display:block;font-size:11px;margin-left:auto;}
  /* states */
  .st-empty,.st-load,.st-err{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:var(--text3);}
  .st-err p{color:var(--danger);}.st-err .ed{font-size:11px;color:var(--text3);max-width:300px;text-align:center;line-height:1.5;}
  .spinner{width:32px;height:32px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .nosel{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px;color:var(--text3);text-align:center;}
  .nosel .bi{font-size:48px;opacity:.12;margin-bottom:4px;}
  /* lightbox */
  .lb-ov{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:1000;display:flex;align-items:center;justify-content:center;animation:fi .15s ease;}
  @keyframes fi{from{opacity:0;}to{opacity:1;}}
  .lb-box{display:flex;flex-direction:column;align-items:center;max-width:95vw;max-height:95vh;position:relative;}
  .lb-img-wrap{display:flex;align-items:center;justify-content:center;}
  .lb-img-wrap img{
    /* Show at original size, shrink only if too large */
    max-width:min(90vw,calc(100vw - 140px));
    max-height:calc(95vh - 90px);
    width:auto;height:auto;
    object-fit:contain;image-rendering:pixelated;border-radius:6px;
    transition:opacity .2s;
  }
  .lb-close{position:fixed;top:16px;right:16px;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:background .12s;z-index:10;}
  .lb-close:hover{background:var(--danger);}
  .lb-nav{position:fixed;top:50%;transform:translateY(-50%);width:48px;height:80px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:10px;color:#fff;cursor:pointer;font-size:26px;display:flex;align-items:center;justify-content:center;transition:background .12s;z-index:10;line-height:1;}
  .lb-nav:hover:not(:disabled){background:rgba(255,255,255,.18);}
  .lb-nav:disabled{opacity:.15;cursor:default;pointer-events:none;}
  .lb-nav.prev{left:16px;}.lb-nav.next{right:16px;}
  .lb-info{margin-top:10px;display:flex;flex-direction:column;align-items:center;gap:5px;}
  .lb-name{font-size:13px;font-weight:500;color:#fff;max-width:60vw;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .lb-meta{display:flex;gap:8px;align-items:center;}
  .lb-tag{font-size:11px;padding:2px 8px;border-radius:10px;background:rgba(255,255,255,.1);color:rgba(255,255,255,.55);}
  .lb-counter{font-size:11px;color:rgba(255,255,255,.35);}
  .lb-actions{display:flex;gap:8px;margin-top:8px;}
  .lbtn{padding:6px 14px;border-radius:var(--radius);font-size:12px;cursor:pointer;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);color:rgba(255,255,255,.8);display:flex;align-items:center;gap:6px;transition:background .12s;}
  .lbtn:hover{background:rgba(255,255,255,.18);color:#fff;}
  /* modals */
  .mov{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:2000;display:flex;align-items:center;justify-content:center;}
  .modal{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;padding:22px;width:360px;}
  .modal h3{font-size:14px;font-weight:600;margin-bottom:16px;}
  .modal label{font-size:12px;color:var(--text2);display:block;margin-bottom:5px;}
  .modal input{width:100%;background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-size:13px;padding:8px 12px;border-radius:var(--radius);outline:none;margin-bottom:12px;transition:border-color .13s;}
  .modal input:focus{border-color:var(--accent);}
  .modal input::placeholder{color:var(--text3);}
  .modal-hint{font-size:11px;color:var(--text3);margin-top:-8px;margin-bottom:14px;line-height:1.6;}
  .modal-status{font-size:12px;min-height:18px;margin-bottom:10px;}
  .modal-status.ok{color:#4caf82;}.modal-status.err{color:var(--danger);}.modal-status.loading{color:var(--text3);}
  .modal-actions{display:flex;gap:8px;}
  .mbtn{flex:1;padding:8px;border-radius:var(--radius);font-size:13px;cursor:pointer;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);transition:all .12s;}
  .mbtn:hover{background:var(--bg4);color:var(--text);}
  .mbtn.primary{background:var(--accent);border-color:var(--accent);color:#fff;}
  .mbtn.primary:hover{background:var(--accent2);}
  .mbtn:disabled{opacity:.4;cursor:default;pointer-events:none;}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="topbar-logo">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect width="8" height="8" rx="2" fill="#7c6af7"/><rect x="10" width="8" height="8" rx="2" fill="#7c6af7" opacity=".5"/><rect y="10" width="8" height="8" rx="2" fill="#7c6af7" opacity=".5"/><rect x="10" y="10" width="8" height="8" rx="2" fill="#7c6af7" opacity=".3"/></svg>
      遊戲圖示圖庫
    </div>
    <div class="topbar-sep"></div>
    <div class="topbar-search">
      <svg class="si" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="searchInput" placeholder="搜尋圖示名稱..." oninput="filterIcons()">
    </div>
  </div>
  <div class="body">
    <div class="sidebar">
      <div class="sidebar-header">資料夾 <button class="add-btn" onclick="showAddModal()" title="新增資料夾">＋</button></div>
      <div class="folder-list" id="folderList"><div class="st-load" style="height:120px"><div class="spinner"></div><p style="font-size:12px">讀取中...</p></div></div>
      <div class="sidebar-footer"><a onclick="showAddModal()">＋ 新增資料夾</a></div>
    </div>
    <div class="main">
      <div class="main-header">
        <div><div class="main-title" id="mainTitle">選擇一個資料夾</div><div class="main-sub" id="mainSub"></div></div>
        <div class="view-toggle">
          <button class="vbtn active" id="gridBtn" onclick="setView('grid')" title="格狀">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><rect x="0" y="0" width="6" height="6" rx="1"/><rect x="10" y="0" width="6" height="6" rx="1"/><rect x="0" y="10" width="6" height="6" rx="1"/><rect x="10" y="10" width="6" height="6" rx="1"/></svg>
          </button>
          <button class="vbtn" id="listBtn" onclick="setView('list')" title="列表">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><rect x="0" y="0" width="16" height="3" rx="1"/><rect x="0" y="6" width="16" height="3" rx="1"/><rect x="0" y="12" width="16" height="3" rx="1"/></svg>
          </button>
        </div>
        <div class="size-wrap">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/></svg>
          <input type="range" id="sizeSlider" min="56" max="180" value="72" step="4" oninput="updateThumbSize(this.value)">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><rect x="0" y="0" width="7" height="7" rx="1"/><rect x="9" y="0" width="7" height="7" rx="1"/><rect x="0" y="9" width="7" height="7" rx="1"/><rect x="9" y="9" width="7" height="7" rx="1"/></svg>
        </div>
      </div>
      <div class="grid-area" id="gridArea"><div class="nosel"><div class="bi">🗂️</div><p>從左側選擇一個資料夾</p></div></div>
    </div>
  </div>
</div>

<!-- Lightbox -->
<div class="lb-ov" id="lbOv" style="display:none" onclick="if(event.target===this)closeLb()">
  <button class="lb-close" onclick="closeLb()">✕</button>
  <button class="lb-nav prev" id="lbPrev" onclick="lbStep(-1)">‹</button>
  <button class="lb-nav next" id="lbNext" onclick="lbStep(1)">›</button>
  <div class="lb-box">
    <div class="lb-img-wrap"><img id="lbImg" src="" alt=""></div>
    <div class="lb-info">
      <div class="lb-name" id="lbName"></div>
      <div class="lb-meta">
        <span class="lb-tag" id="lbExt"></span>
        <span class="lb-tag" id="lbFolder"></span>
        <span class="lb-counter" id="lbCounter"></span>
      </div>
      <div class="lb-actions">
        <button class="lbtn" onclick="copyFileName()">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>複製檔名
        </button>
      </div>
    </div>
  </div>
</div>

<!-- 新增資料夾 Modal -->
<div class="mov" id="addModal" style="display:none">
  <div class="modal">
    <h3>新增資料夾</h3>
    <label>資料夾名稱</label>
    <input type="text" id="newFolderName" placeholder="例如：武器、道具、角色...">
    <div class="modal-hint">將在 Google Drive 的「<span id="rootFolderHint"></span>」底下建立新資料夾，需要 Google 帳號授權。</div>
    <div class="modal-status" id="addStatus"></div>
    <div class="modal-actions">
      <button class="mbtn" onclick="hideAddModal()">取消</button>
      <button class="mbtn primary" id="addConfirmBtn" onclick="confirmAddFolder()">建立並新增</button>
    </div>
  </div>
</div>

<!-- 更名 Modal -->
<div class="mov" id="renameModal" style="display:none">
  <div class="modal">
    <h3>重新命名</h3>
    <label>新名稱</label>
    <input type="text" id="renameInput" placeholder="輸入新名稱">
    <div class="modal-actions">
      <button class="mbtn" onclick="hideRenameModal()">取消</button>
      <button class="mbtn primary" onclick="confirmRename()">確認</button>
    </div>
  </div>
</div>

<script>
// ── Config ──────────────────────────────────────────────────────────────────
const API_KEY      = 'AIzaSyBuI7-G-XrR1fR0Md9c9XPXyZvh8SgBTtU';
const CLIENT_ID    = '';  // 填入 Google OAuth Client ID（用於建立資料夾）
const GAPI         = 'https://www.googleapis.com/drive/v3';
const ROOT_ID      = '1oJ7TT2--PgrH1h8TPsr_pShWHtY0HUXB';
const ROOT_NAME    = 'Idel Casino';

// ── State ────────────────────────────────────────────────────────────────────
let categories  = [];
let currentFolder = null;
let currentFiles  = [];
let viewMode    = 'grid';
const fileMap   = {};
let lbIndex     = -1;
let lbFiles     = [];
let renameId    = null;
let accessToken = null;

function saveCategories(){ try{ localStorage.setItem('igc', JSON.stringify(categories.filter(f=>!f.isAuto))); }catch(e){} }
function loadSaved(){
  try{
    const s=localStorage.getItem('igc');
    if(s){ const saved=JSON.parse(s); saved.forEach(f=>{ if(!categories.find(x=>x.id===f.id)) categories.push(f); }); }
  }catch(e){}
}

// ── Boot ─────────────────────────────────────────────────────────────────────
(async function init(){
  document.getElementById('rootFolderHint').textContent = ROOT_NAME;
  document.addEventListener('keydown', onKey);
  try{ const s=localStorage.getItem('igt'); if(s){ document.getElementById('sizeSlider').value=s; updateThumbSize(s); } }catch(e){}
  try{
    const subs = await fetchSubfolders(ROOT_ID, ROOT_NAME);
    categories = subs;
    loadSaved();
    renderSidebar();
    if(categories.length>0) await selectFolder(categories[0]);
  }catch(e){
    document.getElementById('folderList').innerHTML='<div style="padding:16px;font-size:12px;color:var(--danger);text-align:center">'+esc(e.message)+'</div>';
  }
})();

// ── Drive API (read-only with API Key) ───────────────────────────────────────
async function fetchSubfolders(parentId, parentName){
  const q=encodeURIComponent(`'${parentId}' in parents and mimeType='application/vnd.google-apps.folder' and trashed=false`);
  let all=[], pt='';
  do{
    const res=await fetch(`${GAPI}/files?q=${q}&fields=nextPageToken,files(id,name)&orderBy=name&pageSize=100&key=${API_KEY}${pt?'&pageToken='+pt:''}`);
    const d=await res.json();
    if(d.error) throw new Error(d.error.message);
    (d.files||[]).forEach(f=>all.push({id:f.id,name:f.name,parentName,isAuto:true}));
    pt=d.nextPageToken||'';
  }while(pt);
  if(all.length===0) all.push({id:parentId,name:parentName,parentName:'',isAuto:true});
  return all;
}

async function fetchImages(folderId){
  const q=encodeURIComponent(`'${folderId}' in parents and mimeType contains 'image/' and trashed=false`);
  let all=[], pt='';
  do{
    const res=await fetch(`${GAPI}/files?q=${q}&fields=nextPageToken,files(id,name,mimeType)&orderBy=name&pageSize=200&key=${API_KEY}${pt?'&pageToken='+pt:''}`);
    const d=await res.json();
    if(d.error) throw new Error(d.error.message);
    all=all.concat(d.files||[]);
    pt=d.nextPageToken||'';
  }while(pt);
  return all;
}

// ── Drive API (write — needs OAuth) ──────────────────────────────────────────
async function ensureAccessToken(){
  if(accessToken) return accessToken;
  return new Promise((resolve,reject)=>{
    if(!CLIENT_ID){ reject(new Error('尚未設定 OAuth Client ID，無法建立資料夾。請聯繫管理員。')); return; }
    const w=window.open(
      `https://accounts.google.com/o/oauth2/v2/auth?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(location.origin+location.pathname)}&response_type=token&scope=https://www.googleapis.com/auth/drive.file`,
      'oauth','width=500,height=600'
    );
    const timer=setInterval(()=>{
      try{
        const hash=w.location.hash;
        if(hash&&hash.includes('access_token')){
          clearInterval(timer); w.close();
          const params=new URLSearchParams(hash.slice(1));
          accessToken=params.get('access_token');
          resolve(accessToken);
        }
      }catch(e){}
      if(w.closed){ clearInterval(timer); reject(new Error('授權視窗已關閉')); }
    },300);
  });
}

async function createDriveFolder(name, parentId){
  const token=await ensureAccessToken();
  const res=await fetch('https://www.googleapis.com/drive/v3/files',{
    method:'POST',
    headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'},
    body:JSON.stringify({name,mimeType:'application/vnd.google-apps.folder',parents:[parentId]})
  });
  const d=await res.json();
  if(d.error) throw new Error(d.error.message);
  return d;
}

// ── Sidebar ───────────────────────────────────────────────────────────────────
function renderSidebar(){
  const list=document.getElementById('folderList');
  if(!categories.length){ list.innerHTML='<div style="padding:20px 10px;font-size:12px;color:var(--text3);text-align:center">尚無分類</div>'; return; }
  let html='';
  categories.forEach(f=>{
    const active=currentFolder&&currentFolder.id===f.id?' active':'';
    html+=`<div class="folder-item${active}" onclick="selectFolderById('${f.id}')">
      <span style="font-size:14px;flex-shrink:0;opacity:.7">📁</span>
      <span class="folder-label">${esc(f.name)}</span>
      <div class="folder-actions">
        <button class="fac r" onclick="event.stopPropagation();showRenameModal('${f.id}')" title="重新命名">✏</button>
        <button class="fac d" onclick="event.stopPropagation();deleteFolder('${f.id}')" title="刪除">✕</button>
      </div>
      <span class="folder-count" id="count-${f.id}">—</span>
    </div>`;
  });
  list.innerHTML=html;
}

function selectFolderById(id){ const f=categories.find(x=>x.id===id); if(f) selectFolder(f); }

async function selectFolder(f){
  currentFolder=f;
  document.getElementById('mainTitle').textContent=f.name;
  document.getElementById('mainSub').textContent='載入中...';
  document.getElementById('searchInput').value='';
  renderSidebar();
  document.getElementById('gridArea').innerHTML='<div class="st-load"><div class="spinner"></div><p>正在讀取圖示...</p></div>';
  try{
    const files=await fetchImages(f.id);
    currentFiles=files; lbFiles=files;
    files.forEach(x=>{ fileMap[x.id]=x; });
    const el=document.getElementById('count-'+f.id);
    if(el) el.textContent=files.length;
    document.getElementById('mainSub').textContent=files.length+' 個圖示';
    renderGrid(files);
  }catch(e){
    document.getElementById('gridArea').innerHTML='<div class="st-err"><p>讀取失敗</p><p class="ed">'+esc(e.message)+'</p></div>';
    document.getElementById('mainSub').textContent='載入失敗';
  }
}

function deleteFolder(id){
  if(!confirm('確定要從清單移除這個資料夾嗎？\n（不會刪除 Drive 上的檔案）')) return;
  categories=categories.filter(f=>f.id!==id);
  saveCategories();
  if(currentFolder&&currentFolder.id===id){
    currentFolder=null;
    document.getElementById('mainTitle').textContent='選擇一個資料夾';
    document.getElementById('mainSub').textContent='';
    document.getElementById('gridArea').innerHTML='<div class="nosel"><div class="bi">🗂️</div><p>從左側選擇一個資料夾</p></div>';
  }
  renderSidebar();
}

// ── Rename ────────────────────────────────────────────────────────────────────
function showRenameModal(id){
  renameId=id;
  const f=categories.find(x=>x.id===id);
  document.getElementById('renameInput').value=f?f.name:'';
  document.getElementById('renameModal').style.display='flex';
  setTimeout(()=>{ document.getElementById('renameInput').select(); },50);
}
function hideRenameModal(){ document.getElementById('renameModal').style.display='none'; renameId=null; }
function confirmRename(){
  const n=document.getElementById('renameInput').value.trim();
  if(!n||!renameId) return;
  const f=categories.find(x=>x.id===renameId);
  if(f){ f.name=n; saveCategories(); }
  if(currentFolder&&currentFolder.id===renameId){
    currentFolder.name=n;
    document.getElementById('mainTitle').textContent=n;
  }
  hideRenameModal(); renderSidebar();
}

// ── Add folder ────────────────────────────────────────────────────────────────
function showAddModal(){
  document.getElementById('newFolderName').value='';
  document.getElementById('addStatus').textContent='';
  document.getElementById('addStatus').className='modal-status';
  document.getElementById('addConfirmBtn').disabled=false;
  document.getElementById('addModal').style.display='flex';
  setTimeout(()=>document.getElementById('newFolderName').focus(),50);
}
function hideAddModal(){ document.getElementById('addModal').style.display='none'; }

async function confirmAddFolder(){
  const name=document.getElementById('newFolderName').value.trim();
  if(!name){ document.getElementById('newFolderName').focus(); return; }
  const btn=document.getElementById('addConfirmBtn');
  const status=document.getElementById('addStatus');
  btn.disabled=true;
  status.textContent='正在授權並建立資料夾...';
  status.className='modal-status loading';
  try{
    const created=await createDriveFolder(name, ROOT_ID);
    const newFolder={id:created.id, name:created.name, parentName:ROOT_NAME, isAuto:false};
    categories.push(newFolder);
    saveCategories();
    hideAddModal();
    renderSidebar();
    await selectFolder(newFolder);
  }catch(e){
    status.textContent='✗ '+e.message;
    status.className='modal-status err';
    btn.disabled=false;
  }
}

// ── Grid ──────────────────────────────────────────────────────────────────────
const TSRCS=[
  id=>'https://lh3.googleusercontent.com/d/'+id+'=s200',
  id=>'https://drive.google.com/thumbnail?id='+id+'&sz=w200',
  id=>'https://drive.google.com/uc?export=view&id='+id,
];
const LSRCS=[
  id=>'https://lh3.googleusercontent.com/d/'+id+'=s1600',
  id=>'https://drive.google.com/thumbnail?id='+id+'&sz=w1600',
  id=>'https://drive.google.com/uc?export=view&id='+id,
];

function probeLoad(srcs, id, onOk, onFail){
  let a=0;
  function t(){ const p=new Image(); p.onload=()=>onOk(p.src); p.onerror=()=>{ a++; a<srcs.length?t():onFail&&onFail(); }; p.src=srcs[a](id); }
  t();
}

function loadThumb(fileId){
  const img=document.getElementById('img-'+fileId);
  const ph=document.getElementById('ph-'+fileId);
  if(!img) return;
  probeLoad(TSRCS, fileId, url=>{ img.src=url; img.style.display='block'; if(ph) ph.style.display='none'; });
}

function renderGrid(files){
  lbFiles=files;
  const area=document.getElementById('gridArea');
  if(!files.length){ area.innerHTML='<div class="st-empty"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M3 9h18M9 21V9"/></svg><p>此資料夾沒有圖片</p></div>'; return; }
  let h='<div class="icon-grid '+(viewMode==='list'?'lv':'')+'" id="iconGrid">';
  files.forEach((f,i)=>{
    const ext=(f.name.split('.').pop()||'').toUpperCase();
    h+=`<div class="icon-card" onclick="openLb(${i})">
      <div class="thumb">
        <svg id="ph-${f.id}" class="ph" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="22" height="22"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
        <img id="img-${f.id}" alt="${esc(f.name)}" style="display:none;width:100%;height:100%;object-fit:contain;image-rendering:pixelated">
      </div>
      <div class="iname">${esc(f.name)}</div>
      <div class="iext">${ext}</div>
    </div>`;
  });
  h+='</div>';
  area.innerHTML=h;
  files.forEach((f,i)=>setTimeout(()=>loadThumb(f.id), i*40));
}

function filterIcons(){
  const q=document.getElementById('searchInput').value.toLowerCase().trim();
  const grid=document.getElementById('iconGrid');
  if(!grid) return;
  const filtered=[];
  currentFiles.forEach((f,i)=>{
    const card=grid.querySelectorAll('.icon-card')[i];
    if(!card) return;
    const show=!q||f.name.toLowerCase().includes(q);
    card.style.display=show?'':'none';
    if(show) filtered.push(f);
  });
  lbFiles=q?filtered:currentFiles;
  document.getElementById('mainSub').textContent=q?`搜尋「${q}」— ${filtered.length} 個結果`:currentFiles.length+' 個圖示';
}

function setView(mode){
  viewMode=mode;
  document.getElementById('gridBtn').classList.toggle('active',mode==='grid');
  document.getElementById('listBtn').classList.toggle('active',mode==='list');
  const g=document.getElementById('iconGrid');
  if(g) g.classList.toggle('lv',mode==='list');
}

function updateThumbSize(val){
  const s=parseInt(val),r=document.documentElement;
  r.style.setProperty('--thumb-size',s+'px');
  r.style.setProperty('--card-min',(s+28)+'px');
  r.style.setProperty('--card-pad',Math.max(6,Math.round(s*.13))+'px');
  r.style.setProperty('--grid-gap',s>120?'14px':'10px');
  try{ localStorage.setItem('igt',val); }catch(e){}
}

// ── Lightbox ──────────────────────────────────────────────────────────────────
function openLb(i){ lbIndex=i; showLbImg(); document.getElementById('lbOv').style.display='flex'; }
function closeLb(){ document.getElementById('lbOv').style.display='none'; }

function showLbImg(){
  const f=lbFiles[lbIndex]; if(!f) return;
  const img=document.getElementById('lbImg');
  img.style.opacity='0';
  probeLoad(LSRCS, f.id, url=>{ img.src=url; img.style.transition='opacity .18s'; img.style.opacity='1'; });
  document.getElementById('lbName').textContent=f.name;
  document.getElementById('lbExt').textContent=(f.name.split('.').pop()||'').toUpperCase();
  document.getElementById('lbFolder').textContent=currentFolder?currentFolder.name:'';
  document.getElementById('lbCounter').textContent=(lbIndex+1)+' / '+lbFiles.length;
  document.getElementById('lbPrev').disabled=lbIndex<=0;
  document.getElementById('lbNext').disabled=lbIndex>=lbFiles.length-1;
}

function lbStep(dir){
  const n=lbIndex+dir;
  if(n<0||n>=lbFiles.length) return;
  lbIndex=n; showLbImg();
}

function onKey(e){
  const lb=document.getElementById('lbOv').style.display!=='none';
  const rm=document.getElementById('renameModal').style.display!=='none';
  const am=document.getElementById('addModal').style.display!=='none';
  if(lb){
    if(e.key==='ArrowLeft') lbStep(-1);
    else if(e.key==='ArrowRight') lbStep(1);
    else if(e.key==='Escape') closeLb();
  } else if(rm&&e.key==='Escape') hideRenameModal();
  else if(am&&e.key==='Escape') hideAddModal();
  else if(rm&&e.key==='Enter') confirmRename();
  else if(am&&e.key==='Enter') confirmAddFolder();
}

function copyFileName(){
  const f=lbFiles[lbIndex]; if(!f) return;
  navigator.clipboard.writeText(f.name).then(()=>{
    const btn=event.target.closest('.lbtn');
    const orig=btn.innerHTML; btn.innerHTML='✓ 已複製';
    setTimeout(()=>btn.innerHTML=orig,1500);
  });
}

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>
