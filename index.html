<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>遊戲圖示圖庫</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:#0f0f14; --bg2:#17171e; --bg3:#1e1e28; --bg4:#252532;
    --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.13);
    --text:#e8e8f0; --text2:#9090a8; --text3:#5a5a72;
    --accent:#7c6af7; --accent2:#5b4fd4; --accent-glow:rgba(124,106,247,0.15); --accent-bg:rgba(124,106,247,0.1);
    --danger:#e05c5c; --radius:8px; --radius-lg:12px;
  }
  html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;}
  .app{display:flex;flex-direction:column;height:100vh;overflow:hidden;}
  .topbar{display:flex;align-items:center;gap:14px;padding:0 20px;height:52px;min-height:52px;background:var(--bg2);border-bottom:1px solid var(--border);z-index:10;}
  .topbar-logo{font-size:15px;font-weight:600;letter-spacing:-0.02em;display:flex;align-items:center;gap:8px;}
  .topbar-sep{flex:1;}
  .topbar-search{position:relative;display:flex;align-items:center;}
  .topbar-search input{background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-size:13px;padding:6px 12px 6px 32px;border-radius:20px;width:220px;outline:none;transition:border-color .15s,box-shadow .15s;}
  .topbar-search input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow);}
  .topbar-search input::placeholder{color:var(--text3);}
  .topbar-search .icon{position:absolute;left:10px;color:var(--text3);pointer-events:none;}
  .body{display:flex;flex:1;overflow:hidden;}
  .sidebar{width:220px;min-width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
  .sidebar-header{padding:14px 16px 10px;font-size:11px;font-weight:600;letter-spacing:.08em;color:var(--text3);text-transform:uppercase;display:flex;align-items:center;justify-content:space-between;}
  .add-folder-btn{width:22px;height:22px;border-radius:6px;background:transparent;border:1px solid var(--border2);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;line-height:1;transition:background .12s,color .12s;}
  .add-folder-btn:hover{background:var(--accent-bg);color:var(--accent);border-color:var(--accent);}
  .folder-list{flex:1;overflow-y:auto;padding:4px 8px 8px;}
  .folder-list::-webkit-scrollbar{width:4px;}
  .folder-list::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:4px;}
  .folder-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:var(--radius);cursor:pointer;font-size:13px;color:var(--text2);transition:background .1s,color .1s;user-select:none;position:relative;}
  .folder-item:hover{background:var(--bg3);color:var(--text);}
  .folder-item.active{background:var(--accent-bg);color:var(--accent);}
  .folder-icon{font-size:14px;flex-shrink:0;opacity:.7;}
  .folder-item.active .folder-icon{opacity:1;}
  .folder-label{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .folder-count{font-size:11px;background:var(--bg4);color:var(--text3);padding:1px 6px;border-radius:10px;flex-shrink:0;}
  .folder-item.active .folder-count{background:var(--accent2);color:#fff;}
  .folder-actions{display:none;gap:2px;flex-shrink:0;}
  .folder-item:hover .folder-actions{display:flex;}
  .folder-item:hover .folder-count{display:none;}
  .folder-act-btn{width:18px;height:18px;border-radius:4px;border:none;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;background:transparent;color:var(--text3);}
  .folder-act-btn:hover.rename{background:rgba(124,106,247,.2);color:var(--accent);}
  .folder-act-btn:hover.del{background:rgba(224,92,92,.2);color:var(--danger);}
  .sidebar-footer{padding:10px 16px;border-top:1px solid var(--border);font-size:11px;color:var(--text3);}
  .sidebar-footer a{color:var(--accent);text-decoration:none;cursor:pointer;}
  .main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
  .main-header{padding:12px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--bg);}
  .main-title{font-size:15px;font-weight:600;flex:1;}
  .main-sub{font-size:12px;color:var(--text3);}
  .view-toggle{display:flex;gap:2px;}
  .view-btn{width:30px;height:30px;border-radius:6px;background:transparent;border:1px solid transparent;color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;}
  .view-btn.active{background:var(--bg3);border-color:var(--border2);color:var(--text);}
  .size-slider-wrap{display:flex;align-items:center;gap:6px;margin-left:6px;}
  .size-slider-wrap svg{color:var(--text3);flex-shrink:0;}
  .size-slider-wrap input[type=range]{width:80px;cursor:pointer;accent-color:var(--accent);}
  .grid-area{flex:1;overflow-y:auto;padding:16px 20px;}
  .grid-area::-webkit-scrollbar{width:6px;}
  .grid-area::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:4px;}
  .icon-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(var(--card-min,100px),1fr));gap:var(--grid-gap,10px);}
  .icon-grid.list-view{grid-template-columns:1fr;gap:3px;}
  .icon-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:var(--card-pad,10px) 8px 8px;display:flex;flex-direction:column;align-items:center;gap:7px;cursor:pointer;transition:border-color .13s,background .13s,transform .1s;}
  .icon-card:hover{border-color:var(--accent);background:var(--bg3);transform:translateY(-1px);}
  .icon-grid.list-view .icon-card{flex-direction:row;padding:7px 12px;border-radius:var(--radius);gap:12px;transform:none;}
  .icon-thumb{width:var(--thumb-size,72px);height:var(--thumb-size,72px);border-radius:8px;background:var(--bg3);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;}
  .icon-grid.list-view .icon-thumb{width:36px;height:36px;border-radius:6px;}
  .icon-thumb img{width:100%;height:100%;object-fit:contain;image-rendering:pixelated;}
  .icon-thumb .ph{color:var(--text3);opacity:.5;}
  .icon-name{font-size:11px;color:var(--text2);text-align:center;line-height:1.3;word-break:break-all;max-width:100%;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
  .icon-grid.list-view .icon-name{font-size:13px;text-align:left;flex:1;-webkit-line-clamp:1;}
  .icon-size{font-size:10px;color:var(--text3);display:none;}
  .icon-grid.list-view .icon-size{display:block;font-size:11px;margin-left:auto;}
  .state-empty,.state-loading,.state-error{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:var(--text3);}
  .state-error p{color:var(--danger);}
  .state-error .err-detail{font-size:11px;color:var(--text3);max-width:300px;text-align:center;line-height:1.5;}
  .spinner{width:32px;height:32px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .no-select{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px;color:var(--text3);text-align:center;}
  .no-select .big-icon{font-size:48px;opacity:.12;margin-bottom:4px;}
  /* ── Lightbox ── */
  .lb-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:1000;display:flex;align-items:center;justify-content:center;animation:fadeIn .15s ease;}
  @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
  .lb-box{position:relative;display:flex;flex-direction:column;align-items:center;max-width:90vw;max-height:90vh;}
  .lb-img-wrap{flex:1;display:flex;align-items:center;justify-content:center;min-height:100px;max-height:calc(90vh - 90px);position:relative;}
  .lb-img-wrap img{max-width:min(80vw,800px);max-height:calc(90vh - 110px);object-fit:contain;image-rendering:pixelated;border-radius:8px;display:block;}
  .lb-close{position:fixed;top:16px;right:16px;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:background .12s;z-index:10;}
  .lb-close:hover{background:var(--danger);}
  .lb-nav{position:fixed;top:50%;transform:translateY(-50%);width:48px;height:80px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:10px;color:#fff;cursor:pointer;font-size:22px;display:flex;align-items:center;justify-content:center;transition:background .12s;z-index:10;}
  .lb-nav:hover{background:rgba(255,255,255,.18);}
  .lb-nav.prev{left:16px;}
  .lb-nav.next{right:16px;}
  .lb-nav:disabled{opacity:.2;cursor:default;}
  .lb-info{margin-top:12px;display:flex;flex-direction:column;align-items:center;gap:6px;}
  .lb-name{font-size:13px;font-weight:500;color:#fff;max-width:60vw;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .lb-meta{display:flex;gap:8px;align-items:center;}
  .lb-tag{font-size:11px;padding:2px 8px;border-radius:10px;background:rgba(255,255,255,.1);color:rgba(255,255,255,.6);}
  .lb-counter{font-size:11px;color:rgba(255,255,255,.4);}
  .lb-actions{display:flex;gap:8px;margin-top:8px;}
  .lb-btn{padding:6px 14px;border-radius:var(--radius);font-size:12px;cursor:pointer;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);color:rgba(255,255,255,.8);display:flex;align-items:center;gap:6px;transition:background .12s;}
  .lb-btn:hover{background:rgba(255,255,255,.16);color:#fff;}
  .lb-btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;}
  .lb-btn.primary:hover{background:var(--accent2);}
  /* ── Modals ── */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:2000;display:flex;align-items:center;justify-content:center;}
  .modal{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;padding:22px;width:380px;}
  .modal h3{font-size:14px;font-weight:600;margin-bottom:16px;}
  .modal label{font-size:12px;color:var(--text2);display:block;margin-bottom:5px;}
  .modal input{width:100%;background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-size:13px;padding:8px 12px;border-radius:var(--radius);outline:none;margin-bottom:12px;transition:border-color .13s;}
  .modal input:focus{border-color:var(--accent);}
  .modal input::placeholder{color:var(--text3);}
  .modal-hint{font-size:11px;color:var(--text3);margin-top:-8px;margin-bottom:14px;line-height:1.6;}
  .modal-hint a{color:var(--accent);}
  .modal-status{font-size:12px;min-height:18px;margin-bottom:8px;}
  .modal-status.ok{color:#4caf82;}
  .modal-status.err{color:var(--danger);}
  .modal-status.loading{color:var(--text3);}
  .modal-actions{display:flex;gap:8px;}
  .modal-btn{flex:1;padding:8px;border-radius:var(--radius);font-size:13px;cursor:pointer;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);transition:all .12s;}
  .modal-btn:hover{background:var(--bg4);color:var(--text);}
  .modal-btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;}
  .modal-btn.primary:hover{background:var(--accent2);}
  .modal-btn:disabled{opacity:.4;cursor:default;}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="topbar-logo">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect width="8" height="8" rx="2" fill="#7c6af7"/><rect x="10" width="8" height="8" rx="2" fill="#7c6af7" opacity=".5"/><rect y="10" width="8" height="8" rx="2" fill="#7c6af7" opacity=".5"/><rect x="10" y="10" width="8" height="8" rx="2" fill="#7c6af7" opacity=".3"/></svg>
      遊戲圖示圖庫
    </div>
    <div class="topbar-sep"></div>
    <div class="topbar-search">
      <svg class="icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="searchInput" placeholder="搜尋圖示名稱..." oninput="filterIcons()">
    </div>
  </div>
  <div class="body">
    <div class="sidebar">
      <div class="sidebar-header">資料夾 <button class="add-folder-btn" onclick="showAddModal()" title="新增資料夾">＋</button></div>
      <div class="folder-list" id="folderList"><div class="state-loading" style="height:120px"><div class="spinner"></div><p style="font-size:12px">讀取中...</p></div></div>
      <div class="sidebar-footer"><a onclick="showAddModal()">＋ 新增資料夾</a></div>
    </div>
    <div class="main">
      <div class="main-header">
        <div><div class="main-title" id="mainTitle">選擇一個資料夾</div><div class="main-sub" id="mainSub"></div></div>
        <div class="view-toggle">
          <button class="view-btn active" id="gridBtn" onclick="setView('grid')" title="格狀">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><rect x="0" y="0" width="6" height="6" rx="1"/><rect x="10" y="0" width="6" height="6" rx="1"/><rect x="0" y="10" width="6" height="6" rx="1"/><rect x="10" y="10" width="6" height="6" rx="1"/></svg>
          </button>
          <button class="view-btn" id="listBtn" onclick="setView('list')" title="列表">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><rect x="0" y="0" width="16" height="3" rx="1"/><rect x="0" y="6" width="16" height="3" rx="1"/><rect x="0" y="12" width="16" height="3" rx="1"/></svg>
          </button>
        </div>
        <div class="size-slider-wrap">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/></svg>
          <input type="range" id="thumbSizeSlider" min="56" max="180" value="72" step="4" oninput="updateThumbSize(this.value)" title="調整縮圖大小">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><rect x="0" y="0" width="7" height="7" rx="1"/><rect x="9" y="0" width="7" height="7" rx="1"/><rect x="0" y="9" width="7" height="7" rx="1"/><rect x="9" y="9" width="7" height="7" rx="1"/></svg>
        </div>
      </div>
      <div class="grid-area" id="gridArea">
        <div class="no-select"><div class="big-icon">🗂️</div><p>從左側選擇一個資料夾</p></div>
      </div>
    </div>
  </div>
</div>

<!-- Lightbox -->
<div class="lb-overlay" id="lbOverlay" style="display:none" onclick="if(event.target===this)closeLightbox()">
  <button class="lb-close" onclick="closeLightbox()">✕</button>
  <button class="lb-nav prev" id="lbPrev" onclick="lbStep(-1)">‹</button>
  <button class="lb-nav next" id="lbNext" onclick="lbStep(1)">›</button>
  <div class="lb-box">
    <div class="lb-img-wrap"><img id="lbImg" src="" alt=""></div>
    <div class="lb-info">
      <div class="lb-name" id="lbName"></div>
      <div class="lb-meta">
        <span class="lb-tag" id="lbExt"></span>
        <span class="lb-tag" id="lbFolder"></span>
        <span class="lb-counter" id="lbCounter"></span>
      </div>
      <div class="lb-actions">
        <button class="lb-btn" onclick="copyFileName()">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>複製檔名
        </button>
        <button class="lb-btn primary" onclick="openInDrive()">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>在 Drive 開啟
        </button>
      </div>
    </div>
  </div>
</div>

<!-- 新增資料夾 Modal -->
<div class="modal-overlay" id="addModal" style="display:none">
  <div class="modal">
    <h3>新增資料夾</h3>
    <label>Google Drive 資料夾網址</label>
    <input type="text" id="newFolderUrl" placeholder="https://drive.google.com/drive/folders/..." oninput="onUrlInput()">
    <div class="modal-status" id="addStatus"></div>
    <label>資料夾名稱</label>
    <input type="text" id="newFolderName" placeholder="自動填入，或手動修改">
    <div class="modal-actions">
      <button class="modal-btn" onclick="hideAddModal()">取消</button>
      <button class="modal-btn primary" id="addConfirmBtn" onclick="confirmAddFolder()">新增</button>
    </div>
  </div>
</div>

<!-- 更名 Modal -->
<div class="modal-overlay" id="renameModal" style="display:none">
  <div class="modal">
    <h3>重新命名</h3>
    <label>新名稱</label>
    <input type="text" id="renameInput" placeholder="輸入新名稱">
    <div class="modal-actions">
      <button class="modal-btn" onclick="hideRenameModal()">取消</button>
      <button class="modal-btn primary" onclick="confirmRename()">確認</button>
    </div>
  </div>
</div>

<script>
const API_KEY     = 'AIzaSyBuI7-G-XrR1fR0Md9c9XPXyZvh8SgBTtU';
const GAPI        = 'https://www.googleapis.com/drive/v3';
const ROOT_FOLDERS = [{ id:'1oJ7TT2--PgrH1h8TPsr_pShWHtY0HUXB', name:'Idel Casino' }];

let categories    = [];
let extraFolders  = [];
let currentFolder = null;
let currentFiles  = [];
let viewMode      = 'grid';
const fileMap     = {};
let lbIndex       = -1;
let lbFiles       = [];
let renameTargetId = null;
let urlDebounce   = null;

function saveExtra(){ try{ localStorage.setItem('igx', JSON.stringify(extraFolders)); }catch(e){} }
function loadExtra(){ try{ const s=localStorage.getItem('igx'); if(s) extraFolders=JSON.parse(s); }catch(e){} }
function allFolders(){ return [...categories, ...extraFolders]; }

// ── Boot ────────────────────────────────────────────────────────────────────
(async function init(){
  loadExtra();
  document.addEventListener('keydown', onKey);
  try{ const s=localStorage.getItem('igt'); if(s){ document.getElementById('thumbSizeSlider').value=s; updateThumbSize(s); } }catch(e){}
  try{
    const results = await Promise.all(ROOT_FOLDERS.map(r=>fetchSubfolders(r.id, r.name)));
    categories = results.flat();
    renderSidebar();
    const all = allFolders();
    if(all.length>0) await selectFolder(all[0]);
  }catch(e){
    document.getElementById('folderList').innerHTML='<div style="padding:16px;font-size:12px;color:var(--danger);text-align:center">'+esc(e.message)+'</div>';
  }
})();

// ── Drive API ────────────────────────────────────────────────────────────────
async function fetchSubfolders(parentId, parentName){
  const q=encodeURIComponent(`'${parentId}' in parents and mimeType='application/vnd.google-apps.folder' and trashed=false`);
  let all=[], pt='';
  do{
    const res=await fetch(`${GAPI}/files?q=${q}&fields=nextPageToken,files(id,name)&pageSize=100&key=${API_KEY}${pt?'&pageToken='+pt:''}`);
    const d=await res.json();
    if(d.error) throw new Error(d.error.message);
    (d.files||[]).forEach(f=>all.push({id:f.id,name:f.name,parentName,isAuto:true}));
    pt=d.nextPageToken||'';
  }while(pt);
  if(all.length===0) all.push({id:parentId,name:parentName,parentName:'',isAuto:true});
  return all;
}

async function fetchFolderName(folderId){
  const res=await fetch(`${GAPI}/files/${folderId}?fields=name&key=${API_KEY}`);
  const d=await res.json();
  if(d.error) throw new Error(d.error.message||'無法取得資料夾資訊');
  return d.name;
}

async function fetchImages(folderId){
  const q=encodeURIComponent(`'${folderId}' in parents and mimeType contains 'image/' and trashed=false`);
  let all=[], pt='';
  do{
    const res=await fetch(`${GAPI}/files?q=${q}&fields=nextPageToken,files(id,name,mimeType,webViewLink)&pageSize=200&key=${API_KEY}${pt?'&pageToken='+pt:''}`);
    const d=await res.json();
    if(d.error) throw new Error(d.error.message);
    all=all.concat(d.files||[]);
    pt=d.nextPageToken||'';
  }while(pt);
  return all;
}

// ── Sidebar ──────────────────────────────────────────────────────────────────
function renderSidebar(){
  const list=document.getElementById('folderList');
  const all=allFolders();
  if(!all.length){ list.innerHTML='<div style="padding:20px 10px;font-size:12px;color:var(--text3);text-align:center">尚無分類</div>'; return; }
  const groups={};
  all.forEach(f=>{ const g=f.parentName||'其他'; if(!groups[g]) groups[g]=[]; groups[g].push(f); });
  const multi=Object.keys(groups).length>1;
  let html='';
  for(const [g,items] of Object.entries(groups)){
    if(multi) html+=`<div style="padding:8px 10px 3px;font-size:10px;font-weight:600;letter-spacing:.06em;color:var(--text3);text-transform:uppercase">${esc(g)}</div>`;
    for(const f of items){
      const active=currentFolder&&currentFolder.id===f.id?' active':'';
      html+=`<div class="folder-item${active}" onclick="selectFolderById('${f.id}')">
        <span class="folder-icon">📁</span>
        <span class="folder-label">${esc(f.name)}</span>
        <div class="folder-actions">
          <button class="folder-act-btn rename" onclick="event.stopPropagation();showRenameModal('${f.id}')" title="重新命名">✏</button>
          <button class="folder-act-btn del" onclick="event.stopPropagation();deleteFolder('${f.id}')" title="刪除">✕</button>
        </div>
        <span class="folder-count" id="count-${f.id}">—</span>
      </div>`;
    }
  }
  list.innerHTML=html;
}

function selectFolderById(id){ const f=allFolders().find(x=>x.id===id); if(f) selectFolder(f); }

async function selectFolder(f){
  currentFolder=f;
  document.getElementById('mainTitle').textContent=f.name;
  document.getElementById('mainSub').textContent='載入中...';
  document.getElementById('searchInput').value='';
  renderSidebar();
  document.getElementById('gridArea').innerHTML='<div class="state-loading"><div class="spinner"></div><p>正在讀取圖示...</p></div>';
  try{
    const files=await fetchImages(f.id);
    currentFiles=files;
    files.forEach(x=>{ fileMap[x.id]=x; });
    const el=document.getElementById('count-'+f.id);
    if(el) el.textContent=files.length;
    document.getElementById('mainSub').textContent=files.length+' 個圖示';
    renderGrid(files);
  }catch(e){
    document.getElementById('gridArea').innerHTML='<div class="state-error"><p>讀取失敗</p><p class="err-detail">'+esc(e.message)+'</p></div>';
    document.getElementById('mainSub').textContent='載入失敗';
  }
}

function deleteFolder(id){
  if(!confirm('確定要從清單移除這個資料夾嗎？（不會刪除 Drive 上的檔案）')) return;
  categories=categories.filter(f=>f.id!==id);
  extraFolders=extraFolders.filter(f=>f.id!==id);
  saveExtra();
  if(currentFolder&&currentFolder.id===id){
    currentFolder=null;
    document.getElementById('mainTitle').textContent='選擇一個資料夾';
    document.getElementById('mainSub').textContent='';
    document.getElementById('gridArea').innerHTML='<div class="no-select"><div class="big-icon">🗂️</div><p>從左側選擇一個資料夾</p></div>';
  }
  renderSidebar();
}

// ── Rename ────────────────────────────────────────────────────────────────────
function showRenameModal(id){
  renameTargetId=id;
  const f=allFolders().find(x=>x.id===id);
  document.getElementById('renameInput').value=f?f.name:'';
  document.getElementById('renameModal').style.display='flex';
  setTimeout(()=>document.getElementById('renameInput').focus(),50);
}
function hideRenameModal(){ document.getElementById('renameModal').style.display='none'; renameTargetId=null; }
function confirmRename(){
  const newName=document.getElementById('renameInput').value.trim();
  if(!newName||!renameTargetId) return;
  const inCat=categories.find(f=>f.id===renameTargetId);
  const inExtra=extraFolders.find(f=>f.id===renameTargetId);
  if(inCat) inCat.name=newName;
  if(inExtra) inExtra.name=newName;
  saveExtra();
  if(currentFolder&&currentFolder.id===renameTargetId){
    currentFolder.name=newName;
    document.getElementById('mainTitle').textContent=newName;
  }
  hideRenameModal();
  renderSidebar();
}

// ── Add folder ────────────────────────────────────────────────────────────────
function showAddModal(){
  document.getElementById('newFolderUrl').value='';
  document.getElementById('newFolderName').value='';
  document.getElementById('addStatus').textContent='';
  document.getElementById('addStatus').className='modal-status';
  document.getElementById('addConfirmBtn').disabled=true;
  document.getElementById('addModal').style.display='flex';
  setTimeout(()=>document.getElementById('newFolderUrl').focus(),50);
}
function hideAddModal(){ document.getElementById('addModal').style.display='none'; }

function extractFolderId(url){
  const m=url.match(/\/folders\/([a-zA-Z0-9_-]+)/);
  return m?m[1]:url.trim();
}

function onUrlInput(){
  clearTimeout(urlDebounce);
  const url=document.getElementById('newFolderUrl').value.trim();
  if(!url){ document.getElementById('addStatus').textContent=''; document.getElementById('addConfirmBtn').disabled=true; return; }
  const id=extractFolderId(url);
  if(!id){ return; }
  document.getElementById('addStatus').textContent='正在取得資料夾名稱...';
  document.getElementById('addStatus').className='modal-status loading';
  document.getElementById('addConfirmBtn').disabled=true;
  urlDebounce=setTimeout(async()=>{
    try{
      const name=await fetchFolderName(id);
      document.getElementById('newFolderName').value=name;
      document.getElementById('addStatus').textContent='✓ 已找到：'+name;
      document.getElementById('addStatus').className='modal-status ok';
      document.getElementById('addConfirmBtn').disabled=false;
    }catch(e){
      document.getElementById('addStatus').textContent='✗ '+e.message;
      document.getElementById('addStatus').className='modal-status err';
      document.getElementById('addConfirmBtn').disabled=false; // allow manual name entry
      document.getElementById('newFolderName').placeholder='請手動輸入名稱';
    }
  }, 600);
}

async function confirmAddFolder(){
  const url=document.getElementById('newFolderUrl').value.trim();
  const id=extractFolderId(url);
  const name=document.getElementById('newFolderName').value.trim();
  if(!id){ document.getElementById('addStatus').textContent='✗ 請輸入有效的資料夾網址'; document.getElementById('addStatus').className='modal-status err'; return; }
  if(!name){ document.getElementById('newFolderName').focus(); return; }
  if(allFolders().find(f=>f.id===id)){ alert('這個資料夾已經在清單中了'); return; }
  const f={id,name,parentName:'手動新增',isExtra:true};
  extraFolders.push(f);
  saveExtra();
  hideAddModal();
  renderSidebar();
  await selectFolder(f);
}

// ── Grid ──────────────────────────────────────────────────────────────────────
const THUMB_SRCS=[
  id=>'https://lh3.googleusercontent.com/d/'+id+'=s200',
  id=>'https://drive.google.com/thumbnail?id='+id+'&sz=w200',
  id=>'https://drive.google.com/uc?export=view&id='+id,
];

function loadImg(fileId){
  let attempt=0;
  const img=document.getElementById('img-'+fileId);
  const ph=document.getElementById('ph-'+fileId);
  if(!img) return;
  function tryLoad(){
    const probe=new Image();
    probe.onload=()=>{ img.src=probe.src; img.style.display='block'; if(ph) ph.style.display='none'; };
    probe.onerror=()=>{ attempt++; if(attempt<THUMB_SRCS.length) tryLoad(); };
    probe.src=THUMB_SRCS[attempt](fileId);
  }
  tryLoad();
}

function renderGrid(files){
  lbFiles=files;
  const area=document.getElementById('gridArea');
  if(!files.length){ area.innerHTML='<div class="state-empty"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M3 9h18M9 21V9"/></svg><p>此資料夾沒有圖片</p></div>'; return; }
  let html='<div class="icon-grid '+(viewMode==='list'?'list-view':'')+'" id="iconGrid">';
  files.forEach((f,i)=>{
    const ext=(f.name.split('.').pop()||'').toUpperCase();
    html+=`<div class="icon-card" onclick="openLightbox(${i})">
      <div class="icon-thumb">
        <svg id="ph-${f.id}" class="ph" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="22" height="22"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
        <img id="img-${f.id}" alt="${esc(f.name)}" style="display:none;width:100%;height:100%;object-fit:contain;image-rendering:pixelated">
      </div>
      <div class="icon-name">${esc(f.name)}</div>
      <div class="icon-size">${ext}</div>
    </div>`;
  });
  html+='</div>';
  area.innerHTML=html;
  files.forEach((f,i)=>setTimeout(()=>loadImg(f.id), i*40));
}

function filterIcons(){
  const q=document.getElementById('searchInput').value.toLowerCase().trim();
  const grid=document.getElementById('iconGrid');
  if(!grid) return;
  const filtered=[];
  currentFiles.forEach((f,i)=>{
    const card=grid.querySelectorAll('.icon-card')[i];
    if(!card) return;
    const show=!q||f.name.toLowerCase().includes(q);
    card.style.display=show?'':'none';
    if(show) filtered.push(f);
  });
  lbFiles=q?filtered:currentFiles;
  document.getElementById('mainSub').textContent=q?`搜尋「${q}」— ${filtered.length} 個結果`:currentFiles.length+' 個圖示';
}

function setView(mode){
  viewMode=mode;
  document.getElementById('gridBtn').classList.toggle('active',mode==='grid');
  document.getElementById('listBtn').classList.toggle('active',mode==='list');
  const grid=document.getElementById('iconGrid');
  if(grid) grid.classList.toggle('list-view',mode==='list');
}

function updateThumbSize(val){
  const s=parseInt(val);
  const r=document.documentElement;
  r.style.setProperty('--thumb-size',s+'px');
  r.style.setProperty('--card-min',(s+28)+'px');
  r.style.setProperty('--card-pad',Math.max(6,Math.round(s*.13))+'px');
  r.style.setProperty('--grid-gap',s>120?'14px':'10px');
  try{ localStorage.setItem('igt',val); }catch(e){}
}

// ── Lightbox ──────────────────────────────────────────────────────────────────
const LB_SRCS=[
  id=>'https://lh3.googleusercontent.com/d/'+id+'=s1024',
  id=>'https://drive.google.com/thumbnail?id='+id+'&sz=w800',
  id=>'https://drive.google.com/uc?export=view&id='+id,
];

function openLightbox(index){
  lbIndex=index;
  showLbImage();
  document.getElementById('lbOverlay').style.display='flex';
}

function showLbImage(){
  const f=lbFiles[lbIndex];
  if(!f) return;
  const lbImg=document.getElementById('lbImg');
  lbImg.style.opacity='0';
  let attempt=0;
  function tryLoad(){
    const probe=new Image();
    probe.onload=()=>{ lbImg.src=probe.src; lbImg.style.transition='opacity .2s'; lbImg.style.opacity='1'; };
    probe.onerror=()=>{ attempt++; if(attempt<LB_SRCS.length) tryLoad(); };
    probe.src=LB_SRCS[attempt](f.id);
  }
  tryLoad();
  document.getElementById('lbName').textContent=f.name;
  document.getElementById('lbExt').textContent=(f.name.split('.').pop()||'').toUpperCase();
  document.getElementById('lbFolder').textContent=currentFolder?currentFolder.name:'';
  document.getElementById('lbCounter').textContent=(lbIndex+1)+' / '+lbFiles.length;
  document.getElementById('lbPrev').disabled=lbIndex<=0;
  document.getElementById('lbNext').disabled=lbIndex>=lbFiles.length-1;
}

function lbStep(dir){
  const next=lbIndex+dir;
  if(next<0||next>=lbFiles.length) return;
  lbIndex=next;
  showLbImage();
}

function closeLightbox(){ document.getElementById('lbOverlay').style.display='none'; }

function onKey(e){
  if(document.getElementById('lbOverlay').style.display!=='none'){
    if(e.key==='ArrowLeft') lbStep(-1);
    else if(e.key==='ArrowRight') lbStep(1);
    else if(e.key==='Escape') closeLightbox();
  } else {
    if(e.key==='Escape'){ hideAddModal(); hideRenameModal(); }
  }
}

function copyFileName(){
  const f=lbFiles[lbIndex]; if(!f) return;
  navigator.clipboard.writeText(f.name).then(()=>{
    const btn=event.target.closest('.lb-btn');
    const orig=btn.innerHTML; btn.innerHTML='✓ 已複製';
    setTimeout(()=>btn.innerHTML=orig,1500);
  });
}
function openInDrive(){
  const f=lbFiles[lbIndex]; if(!f) return;
  window.open(f.webViewLink||'https://drive.google.com/file/d/'+f.id+'/view','_blank');
}

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>
