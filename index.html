<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Idel Casino圖庫 v1.3</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --bg:#0f0f14;--bg2:#17171e;--bg3:#1e1e28;--bg4:#252532;
    --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);
    --text:#e8e8f0;--text2:#9090a8;--text3:#5a5a72;
    --accent:#7c6af7;--accent2:#5b4fd4;--accent-glow:rgba(124,106,247,.15);--accent-bg:rgba(124,106,247,.1);
    --danger:#e05c5c;--radius:8px;--radius-lg:12px;
  }
  html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;}
  .app{display:flex;flex-direction:column;height:100vh;overflow:hidden;}
  /* topbar */
  .topbar{display:flex;align-items:center;gap:14px;padding:0 20px;height:52px;min-height:52px;background:var(--bg2);border-bottom:1px solid var(--border);}
  .topbar-logo{font-size:17px;font-weight:600;letter-spacing:-.02em;display:flex;align-items:center;gap:8px;}
  .topbar-sep{flex:1;}
  .topbar-search{position:relative;}
  .topbar-search input{background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-size:15px;padding:6px 12px 6px 32px;border-radius:20px;width:220px;outline:none;transition:border-color .15s,box-shadow .15s;}
  .topbar-search input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow);}
  .topbar-search input::placeholder{color:var(--text3);}
  .topbar-search .si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none;}
  /* body */
  .body{display:flex;flex:1;overflow:hidden;}
  /* sidebar */
  .sidebar{width:220px;min-width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
  .sidebar-header{padding:14px 16px 10px;font-size:13px;font-weight:600;letter-spacing:.08em;color:var(--text3);text-transform:uppercase;display:flex;align-items:center;justify-content:space-between;}
  .add-btn{width:22px;height:22px;border-radius:6px;background:transparent;border:1px solid var(--border2);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;line-height:1;transition:background .12s,color .12s;}
  .add-btn:hover{background:var(--accent-bg);color:var(--accent);border-color:var(--accent);}
  .folder-list{flex:1;overflow-y:auto;padding:4px 8px 8px;}
  .folder-list::-webkit-scrollbar{width:4px;}
  .folder-list::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:4px;}
  .folder-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:var(--radius);cursor:pointer;font-size:15px;color:var(--text2);transition:background .1s,color .1s;user-select:none;position:relative;}
  .folder-item:hover{background:var(--bg3);color:var(--text);}
  .folder-item.active{background:var(--accent-bg);color:var(--accent);}
  .folder-label{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .folder-count{font-size:13px;background:var(--bg4);color:rgba(255,255,255,.55);padding:1px 6px;border-radius:10px;flex-shrink:0;}
  .folder-item.active .folder-count{background:var(--accent2);color:#fff;}
  .folder-actions{display:none;gap:2px;flex-shrink:0;}
  .folder-item:hover .folder-actions{display:flex;}
  .folder-item:hover .folder-count{display:none;}
  .fac{width:18px;height:18px;border-radius:4px;border:none;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;background:transparent;color:var(--text3);transition:background .1s,color .1s;}
  .fac.r:hover{background:rgba(124,106,247,.2);color:var(--accent);}
  .fac.d:hover{background:rgba(224,92,92,.2);color:var(--danger);}
  .sidebar-footer{padding:10px 16px;border-top:1px solid var(--border);font-size:13px;color:var(--text3);}
  .sidebar-footer a{color:var(--accent);text-decoration:none;cursor:pointer;}
  /* main */
  .main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
  .main-header{padding:12px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--bg);}
  .main-title{font-size:17px;font-weight:600;flex:1;}
  .main-sub{font-size:14px;color:var(--text3);}
  .view-toggle{display:flex;gap:2px;}
  .vbtn{width:30px;height:30px;border-radius:6px;background:transparent;border:1px solid transparent;color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;}
  .vbtn.active{background:var(--bg3);border-color:var(--border2);color:var(--text);}
  .size-wrap{display:flex;align-items:center;gap:6px;margin-left:6px;}
  .size-wrap svg{color:var(--text3);flex-shrink:0;}
  .size-wrap input[type=range]{width:80px;cursor:pointer;accent-color:var(--accent);}
  .grid-area{flex:1;overflow-y:auto;padding:16px 20px;}
  .grid-area::-webkit-scrollbar{width:6px;}
  .grid-area::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:4px;}
  /* grid */
  .icon-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(var(--card-min,100px),1fr));gap:var(--grid-gap,10px);}
  .icon-grid.lv{grid-template-columns:1fr;gap:3px;}
  .icon-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:var(--card-pad,10px) 8px 8px;display:flex;flex-direction:column;align-items:center;gap:7px;cursor:pointer;transition:border-color .13s,background .13s,transform .1s;}
  .icon-card:hover{border-color:var(--accent);background:var(--bg3);transform:translateY(-1px);}
  .icon-grid.lv .icon-card{flex-direction:row;padding:7px 12px;border-radius:var(--radius);gap:12px;transform:none;}
  .thumb{width:var(--thumb-size,72px);height:var(--thumb-size,72px);border-radius:8px;background:var(--bg3);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;}
  .icon-grid.lv .thumb{width:36px;height:36px;border-radius:6px;}
  .thumb img{width:100%;height:100%;object-fit:contain;image-rendering:pixelated;}
  .thumb .ph{color:var(--text3);opacity:.4;}
  .iname{font-size:13px;color:var(--text2);text-align:center;line-height:1.3;word-break:break-all;max-width:100%;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
  .icon-grid.lv .iname{font-size:15px;text-align:left;flex:1;-webkit-line-clamp:1;}
  .iext{font-size:12px;color:var(--text3);display:none;}
  .icon-grid.lv .iext{display:block;font-size:13px;margin-left:auto;}
  .ires{font-size:12px;color:var(--text3);text-align:center;min-height:12px;line-height:1;}
  .icon-grid.lv .ires{font-size:13px;margin-left:4px;}
  /* states */
  .st-empty,.st-load,.st-err{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:var(--text3);}
  .st-err p{color:var(--danger);}.st-err .ed{font-size:13px;color:var(--text3);max-width:300px;text-align:center;line-height:1.5;}
  .spinner{width:32px;height:32px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .nosel{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px;color:var(--text3);text-align:center;}
  .nosel .bi{font-size:50px;opacity:.12;margin-bottom:4px;}
  .card-del-btn{display:none;position:absolute;top:5px;right:5px;width:20px;height:20px;border-radius:50%;background:rgba(224,92,92,.85);border:none;color:#fff;cursor:pointer;font-size:13px;align-items:center;justify-content:center;z-index:2;line-height:1;}
  .icon-card:hover .card-del-btn{display:flex;}
  .del-modal-name{font-size:15px;color:var(--text2);background:var(--bg3);border-radius:var(--radius);padding:8px 12px;margin-bottom:14px;word-break:break-all;line-height:1.5;}
  .del-warning{font-size:14px;color:var(--danger);margin-bottom:14px;line-height:1.5;}
  .del-status{font-size:14px;min-height:18px;margin-bottom:8px;color:var(--text3);}
  /* upload */
  .upload-bar{display:flex;align-items:center;gap:10px;padding:8px 20px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;}
  .upload-btn{display:flex;align-items:center;gap:6px;padding:5px 14px;border-radius:var(--radius);background:var(--accent-bg);border:1px solid var(--accent);color:var(--accent);font-size:14px;cursor:pointer;transition:background .12s;}
  .upload-btn:hover{background:rgba(124,106,247,.2);}
  .upload-hint{font-size:13px;color:var(--text3);}
  .upload-progress{flex:1;display:flex;flex-direction:column;gap:4px;max-height:56px;overflow-y:auto;}
  .up-item{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2);}
  .up-item .up-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .up-item .up-bar{width:80px;height:4px;border-radius:2px;background:var(--bg4);flex-shrink:0;}
  .up-item .up-fill{height:100%;border-radius:2px;background:var(--accent);transition:width .2s;}
  .up-item .up-st{font-size:12px;flex-shrink:0;width:28px;text-align:right;}
  .drop-overlay{position:fixed;inset:0;background:rgba(124,106,247,.18);border:3px dashed var(--accent);z-index:500;display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:0;transition:opacity .15s;}
  .drop-overlay.show{opacity:1;}
  .drop-overlay span{font-size:24px;font-weight:600;color:var(--accent);background:var(--bg2);padding:16px 32px;border-radius:12px;}
  /* lightbox */
  .lb-ov{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:1000;display:flex;align-items:center;justify-content:center;animation:fi .15s ease;}
  @keyframes fi{from{opacity:0;}to{opacity:1;}}
  .lb-box{display:flex;flex-direction:column;align-items:center;max-width:95vw;max-height:95vh;position:relative;}
  .lb-img-wrap{display:flex;align-items:center;justify-content:center;}
  .lb-img-wrap img{
    /* Show at original size, shrink only if too large */
    max-width:min(90vw,calc(100vw - 140px));
    max-height:calc(95vh - 90px);
    width:auto;height:auto;
    object-fit:contain;image-rendering:pixelated;border-radius:6px;
    transition:opacity .2s;
  }
  .lb-close{position:fixed;top:16px;right:16px;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;transition:background .12s;z-index:10;}
  .lb-close:hover{background:var(--danger);}
  .lb-nav{position:fixed;top:50%;transform:translateY(-50%);width:48px;height:80px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:10px;color:#fff;cursor:pointer;font-size:28px;display:flex;align-items:center;justify-content:center;transition:background .12s;z-index:10;line-height:1;}
  .lb-nav:hover:not(:disabled){background:rgba(255,255,255,.18);}
  .lb-nav:disabled{opacity:.15;cursor:default;pointer-events:none;}
  .lb-nav.prev{left:16px;}.lb-nav.next{right:16px;}
  .lb-info{margin-top:10px;display:flex;flex-direction:column;align-items:center;gap:5px;}
  .lb-name{font-size:15px;font-weight:500;color:#fff;max-width:60vw;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .lb-meta{display:flex;gap:8px;align-items:center;}
  .lb-tag{font-size:13px;padding:2px 8px;border-radius:10px;background:rgba(255,255,255,.1);color:rgba(255,255,255,.55);}
  .lb-counter{font-size:13px;color:rgba(255,255,255,.35);}
  .lb-actions{display:flex;gap:8px;margin-top:8px;}
  .lbtn{padding:6px 14px;border-radius:var(--radius);font-size:14px;cursor:pointer;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);color:rgba(255,255,255,.8);display:flex;align-items:center;gap:6px;transition:background .12s;}
  .lbtn:hover{background:rgba(255,255,255,.18);color:#fff;}
  /* modals */
  .mov{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:2000;display:flex;align-items:center;justify-content:center;}
  .modal{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;padding:22px;width:360px;}
  .modal h3{font-size:16px;font-weight:600;margin-bottom:16px;}
  .modal label{font-size:14px;color:var(--text2);display:block;margin-bottom:5px;}
  .modal input{width:100%;background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-size:15px;padding:8px 12px;border-radius:var(--radius);outline:none;margin-bottom:12px;transition:border-color .13s;}
  .modal input:focus{border-color:var(--accent);}
  .modal input::placeholder{color:var(--text3);}
  .modal-hint{font-size:13px;color:var(--text3);margin-top:-8px;margin-bottom:14px;line-height:1.6;}
  .modal-status{font-size:14px;min-height:18px;margin-bottom:10px;}
  .modal-status.ok{color:#4caf82;}.modal-status.err{color:var(--danger);}.modal-status.loading{color:var(--text3);}
  .modal-actions{display:flex;gap:8px;}
  .mbtn{flex:1;padding:8px;border-radius:var(--radius);font-size:15px;cursor:pointer;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);transition:all .12s;}
  .mbtn:hover{background:var(--bg4);color:var(--text);}
  .mbtn.primary{background:var(--accent);border-color:var(--accent);color:#fff;}
  .mbtn.primary:hover{background:var(--accent2);}
  .mbtn:disabled{opacity:.4;cursor:default;pointer-events:none;}
  /* multi-select */
  .card-check{position:absolute;top:6px;left:6px;width:20px;height:20px;border-radius:50%;background:var(--bg2);border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:3;opacity:0;transition:opacity .12s,background .12s,border-color .12s;padding:0;}
  .icon-card:hover .card-check,.card-check.checked{opacity:1;}
  .card-check.checked{background:var(--accent);border-color:var(--accent);}
  .card-check svg{display:none;pointer-events:none;}
  .card-check.checked svg{display:block;}
  .icon-card.selected{border-color:var(--accent) !important;background:var(--accent-bg) !important;}
  .bulk-action-bar{display:none;align-items:center;gap:10px;padding:6px 20px;background:rgba(124,106,247,.06);border-bottom:1px solid rgba(124,106,247,.3);flex-shrink:0;}
  .bulk-action-bar.show{display:flex;}
  .bulk-count{font-size:13px;color:var(--accent);flex:1;font-weight:500;}
  .bulk-del-btn{display:flex;align-items:center;gap:6px;padding:5px 14px;border-radius:var(--radius);background:rgba(224,92,92,.1);border:1px solid var(--danger);color:var(--danger);font-size:13px;cursor:pointer;transition:background .12s;}
  .bulk-del-btn:hover{background:rgba(224,92,92,.22);}
  .bulk-clear-btn{display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:var(--radius);background:transparent;border:1px solid var(--border2);color:var(--text2);font-size:13px;cursor:pointer;transition:background .12s;}
  .bulk-clear-btn:hover{background:var(--bg3);}
  /* permission mode */
  body.view-mode .edit-only{display:none !important;}
  .topbar-auth{display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0;}
  .auth-user{font-size:12px;color:var(--text2);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .auth-btn{padding:4px 12px;border-radius:var(--radius);border:1px solid var(--border2);background:transparent;color:var(--text2);font-size:12px;cursor:pointer;transition:background .12s,color .12s;}
  .auth-btn:hover{background:var(--bg3);color:var(--text);}
  .auth-btn.edit-active{border-color:var(--accent);color:var(--accent);}
  /* folder drop target / card drag */
  .folder-item.drop-hover{background:rgba(124,106,247,.22) !important;outline:2px dashed var(--accent);outline-offset:-2px;}
  .icon-card.drag-src{opacity:.35;}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="topbar-logo">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect width="8" height="8" rx="2" fill="#7c6af7"/><rect x="10" width="8" height="8" rx="2" fill="#7c6af7" opacity=".5"/><rect y="10" width="8" height="8" rx="2" fill="#7c6af7" opacity=".5"/><rect x="10" y="10" width="8" height="8" rx="2" fill="#7c6af7" opacity=".3"/></svg>
      Idel Casino圖庫 <span style="font-size:11px;opacity:.5;font-weight:400">v1.3</span>
    </div>
    <div class="topbar-sep"></div>
    <div class="topbar-search">
      <svg class="si" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="searchInput" placeholder="搜尋圖示名稱..." oninput="filterIcons()">
    </div>
    <div class="topbar-auth">
      <span class="auth-user" id="authUser" style="display:none"></span>
      <button class="auth-btn" id="authBtn" onclick="handleAuthClick()">登入以編輯</button>
    </div>
  </div>
  <div class="body">
    <div class="sidebar">
      <div class="sidebar-header">資料夾 <button class="add-btn edit-only" onclick="showAddModal()" title="新增資料夾">＋</button></div>
      <div class="folder-list" id="folderList"><div class="st-load" style="height:120px"><div class="spinner"></div><p style="font-size:14px">讀取中...</p></div></div>
      <div class="sidebar-footer edit-only"><a onclick="showAddModal()">＋ 新增資料夾</a></div>
    </div>
    <div class="main">
      <div class="main-header">
        <div><div class="main-title" id="mainTitle">選擇一個資料夾</div><div class="main-sub" id="mainSub"></div></div>
        <div class="view-toggle">
          <button class="vbtn active" id="gridBtn" onclick="setView('grid')" title="格狀">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><rect x="0" y="0" width="6" height="6" rx="1"/><rect x="10" y="0" width="6" height="6" rx="1"/><rect x="0" y="10" width="6" height="6" rx="1"/><rect x="10" y="10" width="6" height="6" rx="1"/></svg>
          </button>
          <button class="vbtn" id="listBtn" onclick="setView('list')" title="列表">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><rect x="0" y="0" width="16" height="3" rx="1"/><rect x="0" y="6" width="16" height="3" rx="1"/><rect x="0" y="12" width="16" height="3" rx="1"/></svg>
          </button>
        </div>
        <div class="size-wrap">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/></svg>
          <input type="range" id="sizeSlider" min="56" max="180" value="72" step="4" oninput="updateThumbSize(this.value)">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><rect x="0" y="0" width="7" height="7" rx="1"/><rect x="9" y="0" width="7" height="7" rx="1"/><rect x="0" y="9" width="7" height="7" rx="1"/><rect x="9" y="9" width="7" height="7" rx="1"/></svg>
        </div>
      </div>
      <div class="upload-bar edit-only" id="uploadBar">
        <button class="upload-btn" onclick="triggerUpload()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          上傳圖檔
        </button>
        <button class="upload-btn" onclick="triggerFolderUpload()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><polyline points="12 11 12 17"/><polyline points="9 14 12 11 15 14"/></svg>
          上傳資料夾
        </button>
        <span class="upload-hint" id="uploadHint">選擇資料夾後可拖曳圖檔至此上傳</span>
        <div class="upload-progress" id="uploadProgress"></div>
        <input type="file" id="fileInput" multiple accept="image/*" style="display:none" onchange="handleFileInput(this.files)">
        <input type="file" id="folderInput" webkitdirectory mozdirectory multiple style="display:none" onchange="handleFolderInput(this.files)">
      </div>
      <div class="bulk-action-bar" id="bulkActionBar">
        <span class="bulk-count" id="bulkCount"></span>
        <button class="bulk-clear-btn" onclick="clearSelection()">取消選取</button>
        <button class="bulk-del-btn edit-only" onclick="deleteBulkSelected()">

// ── Drive API (read-only with API Key) ───────────────────────────────────────
async function fetchSubfolders(parentId, parentName){
  const q=encodeURIComponent(`'${parentId}' in parents and mimeType='application/vnd.google-apps.folder' and trashed=false`);
  let all=[], pt='';
  do{
    const res=await fetch(`${GAPI}/files?q=${q}&fields=nextPageToken,files(id,name)&orderBy=name&pageSize=100&key=${API_KEY}${pt?'&pageToken='+pt:''}`);
    const d=await res.json();
    if(d.error) throw new Error(d.error.message);
    (d.files||[]).forEach(f=>all.push({id:f.id,name:f.name,parentName,isAuto:true}));
    pt=d.nextPageToken||'';
  }while(pt);
  if(all.length===0) all.push({id:parentId,name:parentName,parentName:'',isAuto:true});
  return all;
}

async function fetchImages(folderId){
  const q=encodeURIComponent(`'${folderId}' in parents and mimeType contains 'image/' and trashed=false`);
  let all=[], pt='';
  do{
    const res=await fetch(`${GAPI}/files?q=${q}&fields=nextPageToken,files(id,name,mimeType)&orderBy=name&pageSize=200&key=${API_KEY}${pt?'&pageToken='+pt:''}`);
    const d=await res.json();
    if(d.error) throw new Error(d.error.message);
    all=all.concat(d.files||[]);
    pt=d.nextPageToken||'';
  }while(pt);
  return all;
}

// ── Drive API (write — needs OAuth) ──────────────────────────────────────────
async function ensureAccessToken(){
  if(accessToken) return accessToken;
  return new Promise((resolve,reject)=>{
    if(!CLIENT_ID){ reject(new Error('尚未設定 OAuth Client ID，無法建立資料夾。請聯繫管理員。')); return; }
    const w=window.open(
      `https://accounts.google.com/o/oauth2/v2/auth?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(location.origin+location.pathname)}&response_type=token&scope=https://www.googleapis.com/auth/drive`,
      'oauth','width=500,height=600'
    );
    const timer=setInterval(()=>{
      try{
        const hash=w.location.hash;
        if(hash&&hash.includes('access_token')){
          clearInterval(timer); w.close();
          const params=new URLSearchParams(hash.slice(1));
          accessToken=params.get('access_token');
          resolve(accessToken);
        }
      }catch(e){}
      if(w.closed){ clearInterval(timer); reject(new Error('授權視窗已關閉')); }
    },300);
  });
}

async function createDriveFolder(name, parentId){
  const token=await ensureAccessToken();
  const res=await fetch('https://www.googleapis.com/drive/v3/files',{
    method:'POST',
    headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'},
    body:JSON.stringify({name,mimeType:'application/vnd.google-apps.folder',parents:[parentId]})
  });
  const d=await res.json();
  if(d.error) throw new Error(d.error.message);
  return d;
}

async function deleteDriveItem(id){
  const token=await ensureAccessToken();
  const res=await fetch(`https://www.googleapis.com/drive/v3/files/${id}`,{
    method:'DELETE',
    headers:{'Authorization':'Bearer '+token}
  });
  if(res.status!==204&&res.status!==200){
    const d=await res.json().catch(()=>({}));
    throw new Error((d.error&&d.error.message)||'刪除失敗（'+res.status+'）');
  }
}

function probeLoad(srcs, id, onOk, onFail){
  let a=0;
  function t(){ const p=new Image(); p.onload=()=>onOk(p.src); p.onerror=()=>{ a++; a<srcs.length?t():onFail&&onFail(); }; p.src=srcs[a](id); }
  t();
}

function loadThumb(fileId){
  const img=document.getElementById('img-'+fileId);
  const ph=document.getElementById('ph-'+fileId);
  if(!img) return;
  probeLoad(TSRCS, fileId, url=>{
    img.src=url;
    img.style.display='block';
    if(ph) ph.style.display='none';
    img.onload=function(){
      const res=document.getElementById('res-'+fileId);
      if(res&&img.naturalWidth) res.textContent=img.naturalWidth+'×'+img.naturalHeight;
      // store for lightbox
      if(fileMap[fileId]) fileMap[fileId]._w=img.naturalWidth, fileMap[fileId]._h=img.naturalHeight;
    };
  });
}

  const lbRes=document.getElementById('lbRes');
  lbRes.textContent = (f._w && f._h) ? f._w+' × '+f._h+' px' : '';
  document.getElementById('lbPrev').disabled=lbIndex<=0;
  document.getElementById('lbNext').disabled=lbIndex>=lbFiles.length-1;
}

function lbStep(dir){
  const n=lbIndex+dir;
  if(n<0||n>=lbFiles.length) return;
  lbIndex=n; showLbImg();
}

function onKey(e){
  const lb=document.getElementById('lbOv').style.display!=='none';
  const rm=document.getElementById('renameModal').style.display!=='none';
  const am=document.getElementById('addModal').style.display!=='none';
  const dm=document.getElementById('deleteModal').style.display!=='none';
  if(lb){
    if(e.key==='ArrowLeft') lbStep(-1);
    else if(e.key==='ArrowRight') lbStep(1);
    else if(e.key==='Escape') closeLb();
  } else if(dm&&e.key==='Escape') hideDeleteModal();
  else if(rm&&e.key==='Escape') hideRenameModal();
  else if(am&&e.key==='Escape') hideAddModal();
  else if(rm&&e.key==='Enter') confirmRename();
  else if(am&&e.key==='Enter') confirmAddFolder();
}

function copyFileName(){

// ── Upload ────────────────────────────────────────────────────────────────────
async function uploadFileToDrive(file, folderId, onProgress){
  const token = await ensureAccessToken();
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = function(e){
      const meta = JSON.stringify({name: file.name, parents: [folderId]});
      const metaBlob = new Blob([meta], {type: 'application/json'});
      const fileBlob = new Blob([e.target.result], {type: file.type});
      const form = new FormData();
      form.append('metadata', metaBlob);
      form.append('file', fileBlob);
      const xhr = new XMLHttpRequest();
      xhr.open('POST', 'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,name,mimeType');
      xhr.setRequestHeader('Authorization', 'Bearer ' + token);
      xhr.upload.onprogress = function(e){ if(e.lengthComputable) onProgress(e.loaded/e.total); };
      xhr.onload = function(){
        try {
          const d = JSON.parse(xhr.responseText);
          if(d.error) reject(new Error(d.error.message));
          else resolve(d);
        } catch(err) { reject(new Error('回應解析失敗')); }
      };
      xhr.onerror = function(){ reject(new Error('網路錯誤')); };
      xhr.send(form);
    };
    reader.readAsArrayBuffer(file);
  });
}

const IMG_EXTS = new Set(['png','jpg','jpeg','gif','webp','bmp','tiff','tif','ico','svg','avif']);
function isImageFile(f){
  if(f.type && f.type.startsWith('image/')) return true;
  const ext = f.name.split('.').pop().toLowerCase();
  return IMG_EXTS.has(ext);
}

function handleFileInput(files){
  if(!files||!files.length) return;
  const all = Array.from(files);
  const imgs = all.filter(isImageFile);
  const skipped = all.length - imgs.length;
  const hint = document.getElementById('uploadHint');
  if(skipped > 0){
    hint.textContent = `已略過 ${skipped} 個非圖檔，共 ${imgs.length} 張圖片`;
    hint.style.color = 'var(--text3)';
    setTimeout(()=>{ hint.textContent='選擇資料夾後可拖曳圖檔至此上傳'; hint.style.color=''; }, 4000);
  }
  if(!imgs.length){
    hint.textContent = '未找到任何圖片檔案';
    hint.style.color = 'var(--danger)';
    setTimeout(()=>{ hint.textContent='選擇資料夾後可拖曳圖檔至此上傳'; hint.style.color=''; }, 3000);
    return;
  }
  processUploadFiles(imgs);
}

function handleFolderInput(files){
  if(!files||!files.length) return;
  const imgs = Array.from(files).filter(isImageFile);
  if(!imgs.length){ alert('未找到任何圖片檔案'); return; }
  uploadFolderStructure(imgs);
}

async function uploadFolderStructure(imgFiles){
  const hint = document.getElementById('uploadHint');
  const progress = document.getElementById('uploadProgress');
  // 支援 webkitRelativePath（<input>）或 _dropRelPath（拖曳 API）
  const getRelPath = f => f.webkitRelativePath || f._dropRelPath || f.name;

  // 取得根資料夾名稱（路徑第一段）
  const rootFolderName = getRelPath(imgFiles[0]).split('/')[0];
  if(!rootFolderName){
    alert('無法取得資料夾名稱，請重新選擇資料夾。');
    hint.textContent='選擇資料夾後可拖曳圖檔至此上傳';
    return;
  }

  // 授權
  hint.textContent='正在授權...';
  hint.style.display='';
  try{ await ensureAccessToken(); }catch(e){ alert('授權失敗：'+e.message); hint.textContent='選擇資料夾後可拖曳圖檔至此上傳'; return; }

  // 找或建立根資料夾
  let rootFolder = categories.find(f=>f.name===rootFolderName);
  if(!rootFolder){
    hint.textContent='正在建立資料夾「'+rootFolderName+'」...';
    try{
      const created = await createDriveFolder(rootFolderName, ROOT_ID);
      rootFolder = {id:created.id, name:created.name, parentName:ROOT_NAME, isAuto:false};
      categories.push(rootFolder);
      saveCategories();
      renderSidebar();
    }catch(e){ alert('建立資料夾失敗：'+e.message); hint.textContent='選擇資料夾後可拖曳圖檔至此上傳'; return; }
  }

  // 切換到該資料夾
  await selectFolder(rootFolder);

  // 蒐集所有子路徑（相對於根資料夾，不含檔名）
  const subPathSet = new Set();
  imgFiles.forEach(f=>{
    const parts = getRelPath(f).split('/');
    for(let d=1; d<parts.length-1; d++){
      subPathSet.add(parts.slice(1,d+1).join('/'));
    }
  });

  // 由淺到深建立子資料夾，並記錄路徑→Drive ID 的對應
  const folderIdMap = {'': rootFolder.id};
  const sortedPaths = Array.from(subPathSet).sort((a,b)=>{
    const da=a.split('/').length, db=b.split('/').length;
    return da!==db ? da-db : a.localeCompare(b);
  });
  for(const path of sortedPaths){
    const parts = path.split('/');
    const parentPath = parts.slice(0,-1).join('/');
    const parentId = folderIdMap[parentPath]||rootFolder.id;
    const folderName = parts[parts.length-1];
    hint.textContent='正在建立子資料夾「'+folderName+'」...';
    try{
      const created = await createDriveFolder(folderName, parentId);
      folderIdMap[path] = created.id;
    }catch(e){
      folderIdMap[path] = parentId;
    }
  }

  // 建立進度列
  hint.style.display='none';
  const rows = {};
  imgFiles.forEach(f=>{
    const uid = 'up-'+Date.now()+'-'+Math.random().toString(36).slice(2);
    rows[getRelPath(f)] = uid;
    const label = getRelPath(f).split('/').slice(1).join('/');
    progress.insertAdjacentHTML('beforeend',
      `<div class="up-item" id="${uid}">
        <span class="up-name">${esc(label)}</span>
        <div class="up-bar"><div class="up-fill" id="fill-${uid}" style="width:0%"></div></div>
        <span class="up-st" id="st-${uid}">0%</span>
      </div>`);
  });

  // 並行上傳所有圖檔
  await Promise.all(imgFiles.map(async file=>{
    const parts = getRelPath(file).split('/');
    const subPath = parts.slice(1,-1).join('/');
    const targetId = folderIdMap[subPath]||rootFolder.id;
    const rowId = rows[getRelPath(file)];
    try{
      const created = await uploadFileToDrive(file, targetId, pct=>{
        const fill=document.getElementById('fill-'+rowId);
        const st=document.getElementById('st-'+rowId);
        if(fill) fill.style.width=Math.round(pct*100)+'%';
        if(st) st.textContent=Math.round(pct*100)+'%';
      });
      const st=document.getElementById('st-'+rowId);
      if(st){ st.textContent='✓'; st.style.color='#4caf82'; }
      // 只有屬於根資料夾的圖檔才即時加進目前格格
      if(targetId===rootFolder.id){
        const newFile={id:created.id, name:created.name, mimeType:created.mimeType};
        fileMap[created.id]=newFile;
        currentFiles.push(newFile);
        lbFiles=currentFiles;
        const countEl=document.getElementById('count-'+rootFolder.id);
        if(countEl) countEl.textContent=currentFiles.length;
        document.getElementById('mainSub').textContent=currentFiles.length+' 個圖示';
        appendCardToGrid(newFile, currentFiles.length-1);
      }
    }catch(e){
      const st=document.getElementById('st-'+rowId);
      if(st){ st.textContent='✗'; st.style.color='var(--danger)'; st.title=e.message; }
    }
  }));

  setTimeout(()=>{
    progress.innerHTML='';
    hint.style.display='';
    hint.textContent='選擇資料夾後可拖曳圖檔至此上傳';
    hint.style.color='';
  }, 3000);
}

async function processUploadFiles(files){
  if(!currentFolder){ alert('請先選擇一個資料夾'); return; }
  const folderId = currentFolder.id;
  const progress = document.getElementById('uploadProgress');
  document.getElementById('uploadHint').style.display='none';

  // Filter images only
  const imgFiles = files.filter(f => f.type.startsWith('image/'));
  if(!imgFiles.length){ alert('請上傳圖片檔案（PNG、JPG、GIF、WEBP 等）'); return; }

  // Create progress rows
  const rows = {};
  imgFiles.forEach(f => {
    const id = 'up-' + Date.now() + '-' + Math.random().toString(36).slice(2);
    rows[f.name] = id;
    progress.insertAdjacentHTML('beforeend',
      `<div class="up-item" id="${id}">
        <span class="up-name">${esc(f.name)}</span>
        <div class="up-bar"><div class="up-fill" id="fill-${id}" style="width:0%"></div></div>
        <span class="up-st" id="st-${id}">0%</span>
      </div>`);
  });

  let succeeded = 0;
  try { await ensureAccessToken(); } catch(e){ alert('授權失敗：'+e.message); return; }

  await Promise.all(imgFiles.map(async file => {
    const rowId = rows[file.name];
    try {
      const created = await uploadFileToDrive(file, folderId, pct => {
        const fill = document.getElementById('fill-'+rowId);
        const st = document.getElementById('st-'+rowId);
        if(fill) fill.style.width = Math.round(pct*100)+'%';
        if(st) st.textContent = Math.round(pct*100)+'%';
      });
      const st = document.getElementById('st-'+rowId);
      if(st){ st.textContent='✓'; st.style.color='#4caf82'; }
      // Add to grid live
      const newFile = {id:created.id, name:created.name, mimeType:created.mimeType};
      fileMap[created.id] = newFile;
      currentFiles.push(newFile);
      lbFiles = currentFiles;
      const countEl = document.getElementById('count-'+folderId);
      if(countEl) countEl.textContent = currentFiles.length;
      document.getElementById('mainSub').textContent = currentFiles.length+' 個圖示';
      appendCardToGrid(newFile, currentFiles.length-1);
      succeeded++;
    } catch(e) {
      const st = document.getElementById('st-'+rowId);
      if(st){ st.textContent='✗'; st.style.color='var(--danger)'; st.title=e.message; }
    }
  }));

  setTimeout(()=>{
    progress.innerHTML='';
    document.getElementById('uploadHint').style.display='';
  }, 3000);
}

// ── Drag & drop (filesystem → upload) ────────────────────────────────────────
(function setupDnd(){
  let dragCount=0;
  document.addEventListener('dragenter', e=>{
    if(!e.dataTransfer.types.includes('Files')) return; // skip internal card drags
    dragCount++;
    if(dragCount===1){
      const hasFolder = Array.from(e.dataTransfer.items||[]).some(item=>{
        try{ return item.webkitGetAsEntry()?.isDirectory; }catch(ex){ return false; }
      });
      const msgFile   = document.getElementById('dropMsgFile');
      const msgFolder = document.getElementById('dropMsgFolder');
      if(hasFolder){
        if(msgFile)   msgFile.style.display='none';
        if(msgFolder) msgFolder.style.display='';
      } else {
        document.getElementById('dropFolderName').textContent = currentFolder?currentFolder.name:'（請先選資料夾）';
        if(msgFile)   msgFile.style.display='';
        if(msgFolder) msgFolder.style.display='none';
      }
      document.getElementById('dropOverlay').classList.add('show');
    }
  });
  document.addEventListener('dragleave', e=>{
    if(!e.dataTransfer.types.includes('Files')) return;
    dragCount--;
    if(dragCount===0) document.getElementById('dropOverlay').classList.remove('show');
  });
  // Card drags use dragData global; only preventDefault for filesystem drops
  document.addEventListener('dragover', e=>{
    if(!dragData) e.preventDefault();
  });
  document.addEventListener('drop', async e=>{
    if(dragData){ dragData=null; return; } // icon drag landed outside a folder → cancel
    if(!isEditMode){ e.preventDefault(); dragCount=0; document.getElementById('dropOverlay').classList.remove('show'); return; }
    e.preventDefault(); dragCount=0;
    document.getElementById('dropOverlay').classList.remove('show');
    const items = Array.from(e.dataTransfer.items||[]);
    const hasFolder = items.some(item=>{
      try{ return item.webkitGetAsEntry()?.isDirectory; }catch(ex){ return false; }
    });
    if(hasFolder && items[0]?.webkitGetAsEntry){
      // Folder drop → group by root folder, create each separately
      const files = await readDropItemsWithPaths(items);
      const imgs = files.filter(isImageFile);
      if(imgs.length){
        const groups={};
        imgs.forEach(f=>{ const r=(f._dropRelPath||f.name).split('/')[0]; (groups[r]||(groups[r]=[])).push(f); });
        for(const grp of Object.values(groups)) await uploadFolderStructure(grp);
      }
    } else {
      if(!currentFolder){ alert('請先選擇一個資料夾再拖曳上傳'); return; }
      if(items.length && items[0].webkitGetAsEntry){
        const files = await readDropItems(items);
        if(files.length) processUploadFiles(files);
      } else {
        const files = Array.from(e.dataTransfer.files||[]);
        if(files.length) processUploadFiles(files);
      }
    }
  });
})();

// Recursively read dropped files (supports folders)
async function readDropItems(items){
  const files = [];
  async function readEntry(entry){
    if(entry.isFile){
      await new Promise(res=>entry.file(f=>{ files.push(f); res(); }, res));
    } else if(entry.isDirectory){
      const reader = entry.createReader();
      await new Promise(res=>{
        function readBatch(){
          reader.readEntries(async entries=>{
            if(!entries.length){ res(); return; }
            await Promise.all(entries.map(readEntry));
            readBatch();
          });
        }
        readBatch();
      });
    }
  }
  await Promise.all(items.map(item=>{
    const entry = item.webkitGetAsEntry();
    return entry ? readEntry(entry) : Promise.resolve();
  }));
  return files;
}

// Recursively read dropped items preserving relative paths (for folder drag-and-drop)
async function readDropItemsWithPaths(items){
  const result=[];
  async function readEntry(entry, prefix){
    if(entry.isFile){
      await new Promise(res=>entry.file(f=>{
        f._dropRelPath=prefix+f.name;
        result.push(f);
        res();
      }, res));
    } else if(entry.isDirectory){
      const reader=entry.createReader();
      await new Promise(res=>{
        function readBatch(){
          reader.readEntries(async entries=>{
            if(!entries.length){ res(); return; }
            await Promise.all(entries.map(e=>readEntry(e, prefix+entry.name+'/')));
            readBatch();
          });
        }
        readBatch();
      });
    }
  }
  await Promise.all(items.map(item=>{
    const entry=item.webkitGetAsEntry();
    return entry ? readEntry(entry,'') : Promise.resolve();
  }));
  return result;
}

// ── Card drag (grid → sidebar move) ──────────────────────────────────────────
function startCardDrag(e, fileId){
  const ids=(selectedIds.size>0&&selectedIds.has(fileId)) ? Array.from(selectedIds) : [fileId];
  dragData=ids;
  e.dataTransfer.setData('text/plain','icon-drag');
  e.dataTransfer.effectAllowed='move';
  // defer opacity change so browser captures drag ghost before card fades
  requestAnimationFrame(()=>{
    ids.forEach(id=>{
      const card=document.getElementById('img-'+id)?.closest('.icon-card')
                 || document.getElementById('chk-'+id)?.closest('.icon-card');
      if(card) card.classList.add('drag-src');
    });
  });
  const cleanup=()=>{
    dragData=null;
    ids.forEach(id=>{
      const card=document.getElementById('img-'+id)?.closest('.icon-card')
                 || document.getElementById('chk-'+id)?.closest('.icon-card');
      if(card) card.classList.remove('drag-src');
    });
    document.removeEventListener('dragend',cleanup);
  };
  document.addEventListener('dragend',cleanup);
}

function folderDragOver(e, folderId){
  if(!dragData||!isEditMode) return; // not a card drag or no edit permission
  e.preventDefault(); e.stopPropagation();
  e.dataTransfer.dropEffect='move';
  document.querySelectorAll('.folder-item.drop-hover').forEach(el=>el.classList.remove('drop-hover'));
  (e.currentTarget||e.target.closest('.folder-item')).classList.add('drop-hover');
}

function folderDragLeave(e, folderId){
  const el=e.currentTarget||e.target.closest('.folder-item');
  if(el&&(!e.relatedTarget||!el.contains(e.relatedTarget))) el.classList.remove('drop-hover');
}

function folderDrop(e, folderId){
  e.preventDefault(); e.stopPropagation();
  (e.currentTarget||e.target.closest('.folder-item'))?.classList.remove('drop-hover');
  if(!dragData||!isEditMode) return;
  const ids=dragData; dragData=null;
  if(ids.length) moveFilesToFolder(ids,folderId);
}

async function moveFilesToFolder(ids, targetFolderId){
  if(!currentFolder||targetFolderId===currentFolder.id) return;
  const hint=document.getElementById('uploadHint');
  hint.textContent='正在授權並移動...'; hint.style.display='';
  let token;
  try{ token=await ensureAccessToken(); }catch(e){ alert('授權失敗：'+e.message); hint.textContent='選擇資料夾後可拖曳圖檔至此上傳'; hint.style.color=''; return; }
  const oldFolderId=currentFolder.id;
  let moved=0, failed=0;
  for(const fid of ids){
    try{
      const res=await fetch(
        `https://www.googleapis.com/drive/v3/files/${fid}?addParents=${targetFolderId}&removeParents=${oldFolderId}&fields=id`,
        {method:'PATCH',headers:{'Authorization':'Bearer '+token}}
      );
      if(!res.ok){ const d=await res.json().catch(()=>({})); throw new Error((d.error&&d.error.message)||res.status); }
      currentFiles=currentFiles.filter(f=>f.id!==fid);
      lbFiles=lbFiles.filter(f=>f.id!==fid);
      delete fileMap[fid];
      selectedIds.delete(fid);
      const img=document.getElementById('img-'+fid);
      if(img){ const card=img.closest('.icon-card'); if(card) card.remove(); }
      moved++;
    }catch(e){ failed++; }
  }
  const el=document.getElementById('count-'+oldFolderId);
  if(el) el.textContent=currentFiles.length;
  const tel=document.getElementById('count-'+targetFolderId);
  if(tel){ const n=parseInt(tel.textContent)||0; tel.textContent=n+moved; }
  document.getElementById('mainSub').textContent=currentFiles.length+' 個圖示';
  updateBulkBar();
  hint.textContent=moved ? '已移動 '+moved+' 個圖示' : '移動失敗';
  hint.style.color=moved ? '#4caf82' : 'var(--danger)';
  setTimeout(()=>{ hint.textContent='選擇資料夾後可拖曳圖檔至此上傳'; hint.style.color=''; },3000);
  if(failed) alert(failed+' 個檔案移動失敗');
}

// ── Multi-select ──────────────────────────────────────────────────────────────
function toggleSelect(id){
  if(selectedIds.has(id)){ selectedIds.delete(id); } else { selectedIds.add(id); }
  const check=document.getElementById('chk-'+id);
  const card=check&&check.closest('.icon-card');
  if(check) check.classList.toggle('checked', selectedIds.has(id));
  if(card)  card.classList.toggle('selected', selectedIds.has(id));
  updateBulkBar();
}

function updateBulkBar(){
  const bar=document.getElementById('bulkActionBar');
  const cnt=document.getElementById('bulkCount');
  if(!bar) return;
  if(selectedIds.size>0){
    bar.classList.add('show');
    cnt.textContent='已選取 '+selectedIds.size+' 個圖示';
  } else {
    bar.classList.remove('show');
  }
}

function clearSelection(){
  selectedIds.forEach(id=>{
    const check=document.getElementById('chk-'+id);
    const card=check&&check.closest('.icon-card');
    if(check) check.classList.remove('checked');
    if(card)  card.classList.remove('selected');
  });
  selectedIds.clear();
  updateBulkBar();
}

function deleteBulkSelected(){
  if(!selectedIds.size) return;
  showDeleteModal('bulk', null, '共 '+selectedIds.size+' 個圖檔');
}

// ── Delete modal ─────────────────────────────────────────────────────────────
let deleteTarget = null; // {type:'file'|'folder'|'bulk', id, name}

function showDeleteModal(type, id, name){
  deleteTarget={type,id,name};
  if(type==='bulk'){
    document.getElementById('deleteModalTitle').textContent='刪除選取的圖檔';
    document.getElementById('deleteTargetName').textContent='共 '+selectedIds.size+' 個圖檔將被刪除';
    document.getElementById('deleteWarning').textContent='這將永久刪除 Google Drive 上選取的所有圖檔，無法復原！';
  } else {
    document.getElementById('deleteModalTitle').textContent = type==='folder' ? '刪除資料夾' : '刪除圖檔';
    document.getElementById('deleteTargetName').textContent = name;
    document.getElementById('deleteWarning').textContent = type==='folder'
      ? '這將永久刪除 Google Drive 上的資料夾及其所有內容，無法復原！'
      : '這將永久刪除 Google Drive 上的圖檔，無法復原！';
  }
  document.getElementById('deleteStatus').textContent='';
  document.getElementById('deleteConfirmBtn').disabled=false;
  document.getElementById('deleteCancelBtn').disabled=false;
  document.getElementById('deleteModal').style.display='flex';
}

function hideDeleteModal(){
  document.getElementById('deleteModal').style.display='none';
  deleteTarget=null;
}

async function confirmDelete(){
  if(!deleteTarget) return;
  const {type,id,name}=deleteTarget;
  const status=document.getElementById('deleteStatus');
  const confirmBtn=document.getElementById('deleteConfirmBtn');
  const cancelBtn=document.getElementById('deleteCancelBtn');
  confirmBtn.disabled=true; cancelBtn.disabled=true;

  if(type==='bulk'){
    const ids=Array.from(selectedIds);
    let done=0, failed=0;
    status.textContent='正在授權並刪除...';
    try{ await ensureAccessToken(); }catch(e){ status.textContent='✗ 授權失敗：'+e.message; confirmBtn.disabled=false; cancelBtn.disabled=false; return; }
    for(const fid of ids){
      try{
        await deleteDriveItem(fid);
        done++;
        status.textContent='已刪除 '+done+' / '+ids.length+'...';
        currentFiles=currentFiles.filter(f=>f.id!==fid);
        lbFiles=lbFiles.filter(f=>f.id!==fid);
        delete fileMap[fid];
        selectedIds.delete(fid);
        const img=document.getElementById('img-'+fid);
        if(img){ const card=img.closest('.icon-card'); if(card) card.remove(); }
      }catch(e){ failed++; }
    }
    hideDeleteModal();
    updateBulkBar();
    const el=document.getElementById('count-'+(currentFolder&&currentFolder.id));
    if(el) el.textContent=currentFiles.length;
    document.getElementById('mainSub').textContent=currentFiles.length+' 個圖示';
    if(failed) setTimeout(()=>alert(failed+' 個檔案刪除失敗'),100);
    return;
  }

  status.textContent='正在授權並刪除...';
  try{
    await deleteDriveItem(id);
    hideDeleteModal();
    if(type==='folder'){
      removeFolderFromSidebar(id);
    } else {
      currentFiles=currentFiles.filter(f=>f.id!==id);
      lbFiles=lbFiles.filter(f=>f.id!==id);
      delete fileMap[id];
      const el=document.getElementById('count-'+(currentFolder&&currentFolder.id));
      if(el) el.textContent=currentFiles.length;
      document.getElementById('mainSub').textContent=currentFiles.length+' 個圖示';
      const img=document.getElementById('img-'+id);
      if(img){
        const card=img.closest('.icon-card');
        if(card) card.remove();
      }
    }
  }catch(e){
    status.textContent='✗ '+e.message;
    confirmBtn.disabled=false; cancelBtn.disabled=false;
  }
}

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>
